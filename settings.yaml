apiVersion: v1alpha1
kind: Setting
metadata:
  name: halo-theme-hydro-minim-setting
spec:
  forms:
    - group: site
      label: 全局基础
      formSchema:
        - $formkit: radio
          id: site_logo_display
          key: site_logo_display
          name: logo_display
          label: 顶部品牌展示
          value: logo
          options:
            - label: 展示 Logo
              value: logo
            - label: 展示站点名称
              value: name
        - $formkit: attachment
          if: $get(site_logo_display).value === 'logo'
          key: site_logo
          name: logo
          label: 方形标识（胶囊菜单）
          value: /themes/halo-theme-hydro-minim/assets/brand/hydro-minim-mark.svg
        - $formkit: attachment
          if: $get(site_logo_display).value === 'logo'
          key: site_dark_logo
          name: dark_logo
          label: 深色方形标识（胶囊菜单）
          value: /themes/halo-theme-hydro-minim/assets/brand/hydro-minim-mark-dark.svg
        - $formkit: attachment
          if: $get(site_logo_display).value === 'logo'
          key: site_nav_logo
          name: nav_logo
          label: 长方形 Logo（顶部菜单）
          value: /themes/halo-theme-hydro-minim/assets/brand/hydro-minim-lockup.svg
        - $formkit: attachment
          if: $get(site_logo_display).value === 'logo'
          key: site_dark_nav_logo
          name: dark_nav_logo
          label: 深色长方形 Logo（顶部菜单）
          value: /themes/halo-theme-hydro-minim/assets/brand/hydro-minim-lockup-dark.svg
        - $formkit: text
          if: $get(site_logo_display).value === 'logo'
          key: site_logo_alt
          name: logo_alt
          label: Logo 替代文本
          value: 氢·简 Hydro-Minim
        - $formkit: attachment
          name: article_cover_1
          label: 默认文章封面 1
          value: /themes/halo-theme-hydro-minim/assets/images/article-1.jpg
        - $formkit: attachment
          name: article_cover_2
          label: 默认文章封面 2
          value: /themes/halo-theme-hydro-minim/assets/images/article-2.jpg
        - $formkit: attachment
          name: article_cover_3
          label: 默认文章封面 3
          value: /themes/halo-theme-hydro-minim/assets/images/article-3.jpg
        - $formkit: array
          name: social_links
          label: 站点社交链接
          value:
            - label: Twitter
              url: "#"
              new_tab: true
              icon: ""
            - label: GitHub
              url: "#"
              new_tab: true
              icon: ""
            - label: Dribbble
              url: "#"
              new_tab: true
              icon: ""
            - label: Email
              url: "mailto:"
              new_tab: false
              icon: ""
          min: 0
          addLabel: 添加社交链接
          itemLabels:
            - type: text
              label: $value.label
          children:
            - $formkit: text
              name: label
              label: 名称
              value: ""
            - $formkit: text
              name: url
              label: 链接
              value: ""
            - $formkit: iconify
              name: icon
              label: 图标（可选）
              format: svg
              value-only: true
            - $formkit: switch
              name: new_tab
              label: 新标签打开
              value: true
    - group: appearance
      label: 全局外观
      formSchema:
        - $formkit: radio
          name: color_scheme
          label: 默认配色模式
          value: auto
          options:
            - label: 跟随系统
              value: auto
            - label: 浅色
              value: light
            - label: 深色
              value: dark
        - $formkit: color
          name: background_color
          label: 浅色背景
          value: "#F3F3F3"
        - $formkit: color
          name: dark_background_color
          label: 深色背景
          value: "#101112"
        - $formkit: color
          name: accent_color
          label: 浅色强调色
          help: 用于文字选中、正文链接、输入焦点、光标、搜索命中和轻量高亮，请保持低饱和以维持氢·简风格。
          value: "#FF6B6B"
        - $formkit: color
          name: dark_accent_color
          label: 深色强调色
          help: 深色模式下的同一套高亮体系，建议比浅色略亮但不要改成高对比霓虹。
          value: "#FF8A8A"
        - $formkit: switch
          name: show_grain
          label: 显示轻微颗粒
          value: true
        - $formkit: switch
          name: enable_motion
          label: 启用全局动效
          value: true
        - $formkit: switch
          name: smooth_scroll
          label: 启用平滑滚动
          value: true
        - $formkit: switch
          name: enable_theme_transition
          label: 启用深浅色光幕过渡
          value: true
        - $formkit: switch
          name: enable_hero_motion
          label: 启用 Hero 图片动效
          value: true
        - $formkit: switch
          name: enable_card_hover
          label: 启用卡片 3D Hover
          value: true
        - $formkit: switch
          name: enable_scroll_tilt
          label: 启用主内容滚动倾斜
          value: true
        - $formkit: switch
          name: enable_text_scramble
          label: 启用文字扰动
          value: true
        - $formkit: switch
          name: enable_lightbox
          label: 启用图片灯箱
          value: true
        - $formkit: text
          name: theme_to_light_label
          label: 切换到浅色提示
          value: 切换为浅色模式
        - $formkit: text
          name: theme_to_dark_label
          label: 切换到深色提示
          value: 切换为深色模式
    - group: navigation
      label: 全局组件
      formSchema:
        - $formkit: switch
          name: show_search
          label: 显示搜索入口
          value: true
        - $formkit: radio
          name: search_entry_mode
          label: 搜索入口方式
          value: modal
          help: 需要安装并启用 PluginSearchWidget。弹窗搜索调用插件弹窗，页面搜索跳转到 /search。
          options:
            - label: 弹窗搜索
              value: modal
            - label: 页面搜索
              value: page
        - $formkit: switch
          name: allow_color_switch
          label: 允许访客切换深浅色
          value: true
        - $formkit: text
          name: mobile_menu_label
          label: 移动端菜单按钮提示
          value: 菜单
        - $formkit: array
          name: fallback_links
          label: 无主菜单时的默认导航
          value:
            - label: 文章
              url: "#articles"
            - label: 分类
              url: "#categories"
            - label: 关于
              url: "#about"
          min: 0
          addLabel: 添加默认导航
          itemLabels:
            - type: text
              label: $value.label
          children:
            - $formkit: text
              name: label
              label: 名称
              value: ""
            - $formkit: text
              name: url
              label: 链接
              value: ""
        - $formkit: text
          name: pagination_previous_label
          label: 分页上一页文案
          value: 上一页
        - $formkit: text
          name: pagination_next_label
          label: 分页下一页文案
          value: 下一页
        - $formkit: switch
          id: navigation_show_back_to_top
          key: navigation_show_back_to_top
          name: show_back_to_top
          label: 显示返回顶部按钮
          value: true
        - $formkit: text
          if: $get(navigation_show_back_to_top).value === true
          name: back_to_top_label
          label: 返回顶部提示
          value: 返回顶部
        - $formkit: number
          if: $get(navigation_show_back_to_top).value === true
          name: back_to_top_threshold
          label: 返回顶部显示阈值
          value: 100
          min: 0
          max: 800
          step: 10
        - $formkit: switch
          id: navigation_fab_enabled
          key: navigation_fab_enabled
          name: fab_enabled
          label: 启用快捷操作按钮
          value: true
        - $formkit: text
          if: $get(navigation_fab_enabled).value === true
          key: navigation_fab_label
          name: fab_label
          label: 快捷操作提示
          value: 快捷操作
        - $formkit: array
          if: $get(navigation_fab_enabled).value === true
          key: navigation_fab_items
          name: fab_items
          label: 全局默认快捷项
          value: []
          min: 0
          max: 5
          addLabel: 添加快捷项
          itemLabels:
            - type: text
              label: $value.label
          children:
            - $formkit: iconify
              name: icon
              label: 图标
              format: svg
              value-only: true
            - $formkit: text
              name: label
              label: 提示文字
              value: ""
            - $formkit: select
              name: type
              label: 动作类型
              value: link
              options:
                - label: 跳转链接
                  value: link
                - label: 主题内置动作
                  value: builtin
                - label: 自定义函数
                  value: custom
            - $formkit: text
              if: "$value.type === undefined || $value.type === '' || $value.type === 'link'"
              key: navigation_fab_item_url
              name: url
              label: 链接地址
              value: ""
            - $formkit: switch
              if: "$value.type === undefined || $value.type === '' || $value.type === 'link'"
              key: navigation_fab_item_new_tab
              name: new_tab
              label: 新标签打开
              value: true
            - $formkit: select
              if: "$value.type === 'builtin'"
              key: navigation_fab_item_builtin_action
              name: builtin_action
              label: 内置动作
              value: search
              options:
                - label: 打开搜索
                  value: search
                - label: 切换深浅色
                  value: theme-toggle
                - label: 返回顶部
                  value: back-to-top
                - label: 复制当前链接
                  value: copy-current-url
                - label: 打印页面
                  value: print
                - label: 打开移动菜单
                  value: open-menu
                - label: 滚动到评论区
                  value: scroll-comment
            - $formkit: text
              if: "$value.type === 'custom'"
              key: navigation_fab_item_custom_handler
              name: custom_handler
              label: 自定义函数名
              value: ""
              help: 在高级设置的自定义 JavaScript 中注册 window.HydroMinimActions，或直接填写 window.LinksSubmit.openSubmitPopup 这类方法路径。
            - $formkit: code
              if: "$value.type === 'custom'"
              key: navigation_fab_item_payload
              name: payload
              label: 自定义函数参数
              language: json
              value: ""
              help: 推荐填写 JSON，例如 {"modal":"sponsor"}；解析失败时会按原始文本传入。
        - $formkit: array
          if: $get(navigation_fab_enabled).value === true
          key: navigation_fab_profiles
          name: fab_profiles
          label: 页面快捷配置
          value: []
          min: 0
          max: 10
          addLabel: 添加页面配置
          itemLabels:
            - type: text
              label: $value.label
          help: 永久链接规则优先于模板 ID 规则，路径命中后会覆盖全局默认快捷项；支持 /about、/about/ 或完整 URL，并兼容当前请求路径；如果页面配置没有快捷项，会回退全局默认快捷项；所有页面规则可作为兜底。
          children:
            - $formkit: text
              name: label
              label: 配置名称
              value: ""
            - $formkit: select
              name: match_type
              label: 匹配方式
              value: template
              options:
                - label: 所有页面
                  value: all
                - label: 模板 ID
                  value: template
                - label: 永久链接
                  value: permalink
            - $formkit: text
              if: "$value.match_type !== 'all'"
              key: navigation_fab_profile_match_value
              name: match_value
              label: 匹配值
              value: ""
              help: 模板 ID 示例：index、post、page_about、docs。永久链接建议填 /about、/docs 这类路径，也兼容尾斜杠和完整 URL。
            - $formkit: array
              name: items
              label: 快捷项
              value: []
              min: 0
              max: 5
              addLabel: 添加快捷项
              itemLabels:
                - type: text
                  label: $value.label
              children:
                - $formkit: iconify
                  name: icon
                  label: 图标
                  format: svg
                  value-only: true
                - $formkit: text
                  name: label
                  label: 提示文字
                  value: ""
                - $formkit: select
                  name: type
                  label: 动作类型
                  value: link
                  options:
                    - label: 跳转链接
                      value: link
                    - label: 主题内置动作
                      value: builtin
                    - label: 自定义函数
                      value: custom
                - $formkit: text
                  if: "$value.type === undefined || $value.type === '' || $value.type === 'link'"
                  key: navigation_fab_profile_item_url
                  name: url
                  label: 链接地址
                  value: ""
                - $formkit: switch
                  if: "$value.type === undefined || $value.type === '' || $value.type === 'link'"
                  key: navigation_fab_profile_item_new_tab
                  name: new_tab
                  label: 新标签打开
                  value: true
                - $formkit: select
                  if: "$value.type === 'builtin'"
                  key: navigation_fab_profile_item_builtin_action
                  name: builtin_action
                  label: 内置动作
                  value: search
                  options:
                    - label: 打开搜索
                      value: search
                    - label: 切换深浅色
                      value: theme-toggle
                    - label: 返回顶部
                      value: back-to-top
                    - label: 复制当前链接
                      value: copy-current-url
                    - label: 打印页面
                      value: print
                    - label: 打开移动菜单
                      value: open-menu
                    - label: 滚动到评论区
                      value: scroll-comment
                - $formkit: text
                  if: "$value.type === 'custom'"
                  key: navigation_fab_profile_item_custom_handler
                  name: custom_handler
                  label: 自定义函数名
                  value: ""
                  help: 在高级设置的自定义 JavaScript 中注册 window.HydroMinimActions，或直接填写 window.LinksSubmit.openSubmitPopup 这类方法路径。
                - $formkit: code
                  if: "$value.type === 'custom'"
                  key: navigation_fab_profile_item_payload
                  name: payload
                  label: 自定义函数参数
                  language: json
                  value: ""
                  help: 推荐填写 JSON，例如 {"modal":"sponsor"}；解析失败时会按原始文本传入。
    - group: footer
      label: 页脚
      formSchema:
        - $formkit: switch
          id: footer_show_marquee
          key: footer_show_marquee
          name: show_marquee
          label: 显示页脚滚动字
          value: true
        - $formkit: text
          if: $get(footer_show_marquee).value === true
          name: marquee_text
          label: 滚动字
          value: 氢
        - $formkit: text
          label: 页脚品牌短字
          value: 氢
        - $formkit: textarea
          name: description
          label: 页脚描述
          value: 艺术的生活家。在结构化与自由之间，寻找设计的平衡。
        - $formkit: switch
          name: show_nav
          label: 显示页脚导航
          value: true
        - $formkit: text
          name: nav_title
          label: 导航栏目标题
          value: 导航
        - $formkit: switch
          name: show_social
          label: 显示页脚社交链接
          value: true
        - $formkit: text
          name: social_title
          label: 社交栏目标题
          value: 社交
        - $formkit: text
          name: copyright
          label: 版权文案
          value: "© {year} {site}. 保留所有权利."
          help: 支持 {year} 和 {site} 占位符。
        - $formkit: text
          name: build_text
          label: 构建署名
          value: 用 ♥ 与氢气构建
        - $formkit: text
          name: icp_text
          label: ICP 备案号
          value: ""
        - $formkit: url
          name: icp_link
          label: ICP 备案链接
          value: "https://beian.miit.gov.cn/"
        - $formkit: text
          name: gongan_text
          label: 公安联网备案号
          value: ""
        - $formkit: url
          name: gongan_link
          label: 公安联网备案链接
          value: ""
    - group: home
      label: 首页
      formSchema:
        - $formkit: switch
          id: home_show_hero
          key: home_show_hero
          name: show_hero
          label: 显示首屏 Hero
          value: true
        - $formkit: text
          if: $get(home_show_hero).value === true
          name: hero_label
          label: Hero 标签
          value: 氢视窗
        - $formkit: text
          if: $get(home_show_hero).value === true
          name: hero_title
          label: Hero 标题
          value: 探索
        - $formkit: textarea
          if: $get(home_show_hero).value === true
          name: hero_description
          label: Hero 描述
          value: 精选的想法、故事和创意，全部汇集于此。如氢气般轻快、简洁、流畅的体验。
        - $formkit: attachment
          if: $get(home_show_hero).value === true
          name: hero_cover
          label: Hero 封面
          value: /themes/halo-theme-hydro-minim/assets/images/hero-featured.jpg
        - $formkit: text
          if: $get(home_show_hero).value === true
          name: hero_scroll_hint
          label: Hero 滚动提示
          value: 向下滚动
        - $formkit: number
          if: $get(home_show_hero).value === true
          name: hero_featured_size
          label: Hero 右侧文章数量
          value: 4
          min: 1
          max: 8
          step: 1
        - $formkit: postSelect
          if: $get(home_show_hero).value === true
          name: hero_featured_posts
          label: Hero 右侧指定文章
          multiple: true
          value: []
          help: 选择后右侧列表按选择顺序展示指定文章；留空时展示最新文章，数量仍受上方设置限制。
        - $formkit: text
          if: $get(home_show_hero).value === true
          name: hero_empty_text
          label: Hero 无文章提示
          value: 还没有发布文章。
        - $formkit: switch
          id: home_show_latest
          key: home_show_latest
          name: show_latest
          label: 显示最新文章
          value: true
        - $formkit: text
          if: $get(home_show_latest).value === true
          name: latest_title
          label: 最新文章标题
          value: 最新文章
        - $formkit: number
          if: $get(home_show_latest).value === true
          name: latest_size
          label: 首页文章展示数量
          value: 3
          min: 1
          max: 6
          step: 1
        - $formkit: text
          if: $get(home_show_latest).value === true
          name: latest_action_label
          label: 最新文章按钮文案
          value: 查看全部文章
        - $formkit: text
          if: $get(home_show_latest).value === true
          name: latest_empty_text
          label: 无文章提示
          value: 还没有发布文章。
        - $formkit: switch
          id: home_show_categories
          key: home_show_categories
          name: show_categories
          label: 显示分类模块
          value: true
        - $formkit: text
          if: $get(home_show_categories).value === true
          name: categories_title
          label: 分类模块标题
          value: 分类
        - $formkit: number
          if: $get(home_show_categories).value === true
          name: categories_size
          label: 首页分类展示数量
          value: 4
          min: 1
          max: 8
          step: 1
        - $formkit: text
          if: $get(home_show_categories).value === true
          name: category_fallback_description
          label: 分类描述兜底
          value: 继续探索这个分类下的内容
        - $formkit: text
          if: $get(home_show_categories).value === true
          name: categories_all_title
          label: 全部分类卡片标题
          value: 全部
        - $formkit: text
          if: $get(home_show_categories).value === true
          name: categories_all_description
          label: 全部分类卡片描述
          value: 浏览所有文章内容
        - $formkit: text
          if: $get(home_show_categories).value === true
          name: categories_cta_label
          label: 分类卡片 CTA
          value: 探索
        - $formkit: text
          if: $get(home_show_categories).value === true
          name: categories_cursor_text
          label: 分类悬浮 Cursor 文案
          value: 查看
        - $formkit: switch
          id: home_show_about
          key: home_show_about
          name: show_about
          label: 显示首页关于模块
          value: true
        - $formkit: text
          if: $get(home_show_about).value === true
          name: about_eyebrow
          label: 关于模块标签
          value: About
        - $formkit: text
          if: $get(home_show_about).value === true
          name: about_title
          label: 关于标题
          value: 关于
        - $formkit: text
          if: $get(home_show_about).value === true
          name: about_subtitle
          label: 关于副标题
          value: 艺术的生活家
        - $formkit: textarea
          if: $get(home_show_about).value === true
          name: about_paragraph_1
          label: 关于段落一
          value: 氢风格博客诞生于对简约美学的追求。我们相信，好的设计应该像氢气一样——轻快、简洁、流畅，却蕴含着无限的可能。
        - $formkit: textarea
          if: $get(home_show_about).value === true
          name: about_paragraph_2
          label: 关于段落二
          value: 在这里，我们分享关于设计、科技与生活方式的思考。每一篇文章都是精心策划的创意表达，旨在为读者带来启发与美的享受。
        - $formkit: textarea
          if: $get(home_show_about).value === true
          name: about_paragraph_3
          label: 关于段落三
