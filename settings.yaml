apiVersion: v1alpha1
kind: Setting
metadata:
  name: halo-theme-hydro-minim-setting
spec:
  forms:
    - group: identity
      label: 品牌与站点
      formSchema:
        - $formkit: group
          name: brand
          label: 品牌标识
          children:
            - $formkit: radio
              id: identity_brand_logo_display
              key: identity_brand_logo_display
              name: logo_display
              label: 顶部品牌展示
              value: logo
              options:
                - label: 展示 Logo
                  value: logo
                - label: 展示站点名称
                  value: name
            - $formkit: attachment
              if: $get(identity_brand_logo_display).value === 'logo'
              name: logo
              label: 方形标识（胶囊菜单）
              accepts:
                - image/*
              width: 160px
              aspectRatio: "1/1"
              value: /themes/halo-theme-hydro-minim/assets/brand/hydro-minim-mark.svg
            - $formkit: attachment
              if: $get(identity_brand_logo_display).value === 'logo'
              name: dark_logo
              label: 深色方形标识（胶囊菜单）
              accepts:
                - image/*
              width: 160px
              aspectRatio: "1/1"
              value: /themes/halo-theme-hydro-minim/assets/brand/hydro-minim-mark-dark.svg
            - $formkit: attachment
              if: $get(identity_brand_logo_display).value === 'logo'
              name: nav_logo
              label: 长方形 Logo（顶部菜单）
              accepts:
                - image/*
              width: 260px
              aspectRatio: "3/1"
              value: /themes/halo-theme-hydro-minim/assets/brand/hydro-minim-lockup.svg
            - $formkit: attachment
              if: $get(identity_brand_logo_display).value === 'logo'
              name: dark_nav_logo
              label: 深色长方形 Logo（顶部菜单）
              accepts:
                - image/*
              width: 260px
              aspectRatio: "3/1"
              value: /themes/halo-theme-hydro-minim/assets/brand/hydro-minim-lockup-dark.svg
            - $formkit: text
              if: $get(identity_brand_logo_display).value === 'logo'
              name: logo_alt
              label: Logo 替代文本
              value: 氢·简 Hydro-Minim
        - $formkit: group
          name: defaults
          label: 默认素材
          children:
            - $formkit: attachment
              name: article_cover_1
              label: 默认文章封面 1
              accepts:
                - image/*
              value: /themes/halo-theme-hydro-minim/assets/images/article-1.jpg
            - $formkit: attachment
              name: article_cover_2
              label: 默认文章封面 2
              accepts:
                - image/*
              value: /themes/halo-theme-hydro-minim/assets/images/article-2.jpg
            - $formkit: attachment
              name: article_cover_3
              label: 默认文章封面 3
              accepts:
                - image/*
              value: /themes/halo-theme-hydro-minim/assets/images/article-3.jpg
        - $formkit: group
          name: social
          label: 社交链接
          children:
            - $formkit: array
              name: links
              label: 站点社交链接
              value:
                - label: Twitter
                  url: "#"
                  new_tab: true
                  icon: ""
                - label: GitHub
                  url: "#"
                  new_tab: true
                  icon: ""
                - label: Dribbble
                  url: "#"
                  new_tab: true
                  icon: ""
                - label: Email
                  url: "mailto:"
                  new_tab: false
                  icon: ""
              min: 0
              addLabel: 添加社交链接
              itemLabels:
                - type: text
                  label: $value.label
              children:
                - $formkit: text
                  name: label
                  label: 名称
                  value: ""
                - $formkit: url
                  name: url
                  label: 链接
                  value: ""
                - $formkit: iconify
                  name: icon
                  label: 图标（可选）
                  format: svg
                  value-only: true
                - $formkit: switch
                  name: new_tab
                  label: 新标签打开
                  value: true
        - $formkit: group
          name: footer
          label: 页脚信息
          children:
            - $formkit: switch
              name: show_marquee
              label: 显示页脚滚动字
              value: true
            - $formkit: text
              name: marquee_text
              label: 滚动字
              value: 氢
            - $formkit: text
              name: brand_text
              label: 页脚品牌短字
              value: 氢
            - $formkit: textarea
              name: description
              label: 页脚描述
              value: 艺术的生活家。在结构化与自由之间，寻找设计的平衡。
            - $formkit: switch
              name: show_nav
              label: 显示页脚导航
              value: true
            - $formkit: switch
              name: show_social
              label: 显示页脚社交链接
              value: true
            - $formkit: text
              name: copyright
              label: 版权文案
              value: "© {year} {site}. 保留所有权利."
            - $formkit: text
              name: build_text
              label: 构建署名
              value: 用 ♥ 与氢气构建
            - $formkit: text
              name: icp_text
              label: ICP 备案号
              value: ""
            - $formkit: url
              name: icp_link
              label: ICP 备案链接
              value: https://beian.miit.gov.cn/
            - $formkit: text
              name: gongan_text
              label: 公安联网备案号
              value: ""
            - $formkit: url
              name: gongan_link
              label: 公安联网备案链接
              value: ""

    - group: presentation
      label: 视觉与动效
      formSchema:
        - $formkit: group
          name: color
          label: 配色
          children:
            - $formkit: radio
              name: color_scheme
              label: 默认配色模式
              value: auto
              options:
                - label: 跟随系统
                  value: auto
                - label: 浅色
                  value: light
                - label: 深色
                  value: dark
            - $formkit: color
              name: background_color
              label: 浅色背景
              value: "#F3F3F3"
            - $formkit: color
              name: dark_background_color
              label: 深色背景
              value: "#101112"
            - $formkit: color
              name: accent_color
              label: 浅色强调色
              help: 用于文字选中、正文链接、输入焦点、光标、搜索命中和轻量高亮。
              value: "#FF6B6B"
            - $formkit: color
              name: dark_accent_color
              label: 深色强调色
              value: "#FF8A8A"
        - $formkit: group
          name: motion
          label: 动效与质感
          children:
            - $formkit: switch
              name: show_grain
              label: 显示轻微颗粒
              value: true
            - $formkit: switch
              name: enable_motion
              label: 启用全局动效
              value: true
            - $formkit: switch
              name: smooth_scroll
              label: 启用平滑滚动
              value: true
            - $formkit: switch
              name: enable_theme_transition
              label: 启用深浅色光幕过渡
              value: true
            - $formkit: switch
              name: enable_hero_motion
              label: 启用 Hero 图片动效
              value: true
            - $formkit: switch
              name: enable_card_hover
              label: 启用卡片 3D Hover
              value: true
            - $formkit: switch
              name: enable_scroll_tilt
              label: 启用主内容滚动倾斜
              value: true
            - $formkit: switch
              name: enable_text_scramble
              label: 启用文字扰动
              value: true
            - $formkit: switch
              name: enable_lightbox
              label: 启用图片灯箱
              value: true
        - $formkit: group
          name: theme_toggle
          label: 深浅色切换
          children:
            - $formkit: text
              name: to_light_label
              label: 切换到浅色提示
              value: 切换为浅色模式
            - $formkit: text
              name: to_dark_label
              label: 切换到深色提示
              value: 切换为深色模式

    - group: navigation
      label: 导航与结构
      formSchema:
        - $formkit: group
          name: header
          label: Header 与搜索
          children:
            - $formkit: switch
              name: show_search
              label: 显示搜索入口
              value: true
            - $formkit: radio
              name: search_entry_mode
              label: 搜索入口方式
              value: modal
              help: 需要安装并启用 PluginSearchWidget。
              options:
                - label: 弹窗搜索
                  value: modal
                - label: 页面搜索
                  value: page
            - $formkit: switch
              name: allow_color_switch
              label: 允许访客切换深浅色
              value: true
            - $formkit: text
              name: mobile_menu_label
              label: 移动端菜单按钮提示
              value: 菜单
        - $formkit: group
          name: fallback_menu
          label: 默认导航
          children:
            - $formkit: array
              name: links
              label: 无主菜单时的默认导航
              value:
                - label: 文章
                  url: "#articles"
                - label: 分类
                  url: "#categories"
                - label: 关于
                  url: "#about"
              min: 0
              addLabel: 添加默认导航
              itemLabels:
                - type: text
                  label: $value.label
              children:
                - $formkit: text
                  name: label
                  label: 名称
                  value: ""
                - $formkit: url
                  name: url
                  label: 链接
                  value: ""
        - $formkit: group
          name: pagination
          label: 分页
          children:
            - $formkit: text
              name: previous_label
              label: 上一页文案
              value: 上一页
            - $formkit: text
              name: next_label
              label: 下一页文案
              value: 下一页
        - $formkit: group
          name: floating
          label: 浮动操作
          children:
            - $formkit: switch
              id: navigation_floating_show_back_to_top
              key: navigation_floating_show_back_to_top
              name: show_back_to_top
              label: 显示返回顶部按钮
              value: true
            - $formkit: number
              if: $get(navigation_floating_show_back_to_top).value === true
              name: back_to_top_threshold
              label: 返回顶部显示阈值
              value: 100
              min: 0
              max: 800
              step: 10
            - $formkit: switch
              id: navigation_floating_fab_enabled
              key: navigation_floating_fab_enabled
              name: fab_enabled
              label: 启用快捷操作按钮
              value: true
            - $formkit: text
              if: $get(navigation_floating_fab_enabled).value === true
              name: fab_label
              label: 快捷操作提示
              value: 快捷操作
            - $formkit: array
              if: $get(navigation_floating_fab_enabled).value === true
              name: fab_items
              label: 全局默认快捷项
              value: []
              min: 0
              max: 5
              addLabel: 添加快捷项
              itemLabels:
                - type: text
                  label: $value.label
              children:
                - $formkit: iconify
                  name: icon
                  label: 图标
                  format: svg
                  value-only: true
                - $formkit: text
                  name: label
                  label: 提示文字
                  value: ""
                - $formkit: select
                  name: type
                  label: 动作类型
                  value: link
                  options:
                    - label: 跳转链接
                      value: link
                    - label: 主题内置动作
                      value: builtin
                    - label: 自定义函数
                      value: custom
                - $formkit: url
                  if: "$value.type === undefined || $value.type === '' || $value.type === 'link'"
                  name: url
                  label: 链接地址
                  value: ""
                - $formkit: switch
                  if: "$value.type === undefined || $value.type === '' || $value.type === 'link'"
                  name: new_tab
                  label: 新标签打开
                  value: true
                - $formkit: select
                  if: "$value.type === 'builtin'"
                  name: builtin_action
                  label: 内置动作
                  value: search
                  options:
                    - label: 打开搜索
                      value: search
                    - label: 切换深浅色
                      value: theme-toggle
                    - label: 返回顶部
                      value: back-to-top
                    - label: 复制当前链接
                      value: copy-current-url
                    - label: 会员签到
                      value: member-sign-in
                    - label: 文章收藏
                      value: member-favorite
                    - label: 打印页面
                      value: print
                    - label: 打开移动菜单
                      value: open-menu
                    - label: 滚动到评论区
                      value: scroll-comment
                - $formkit: text
                  if: "$value.type === 'custom'"
                  name: custom_handler
                  label: 自定义函数名
                  value: ""
                - $formkit: code
                  if: "$value.type === 'custom'"
                  name: payload
                  label: 自定义函数参数
                  language: json
                  value: ""
            - $formkit: array
              if: $get(navigation_floating_fab_enabled).value === true
              name: fab_profiles
              label: 页面快捷配置
              value: []
              min: 0
              max: 10
              addLabel: 添加页面配置
              itemLabels:
                - type: text
                  label: $value.label
              children:
                - $formkit: text
                  name: label
                  label: 配置名称
                  value: ""
                - $formkit: select
                  name: match_type
                  label: 匹配方式
                  value: template
                  options:
                    - label: 所有页面
                      value: all
                    - label: 模板 ID
                      value: template
                    - label: 永久链接
                      value: permalink
                - $formkit: text
                  if: "$value.match_type !== 'all'"
                  name: match_value
                  label: 匹配值
                  value: ""
                - $formkit: array
                  name: items
                  label: 快捷项
                  value: []
                  min: 0
                  max: 5
                  addLabel: 添加快捷项
                  itemLabels:
                    - type: text
                      label: $value.label
                  children:
                    - $formkit: iconify
                      name: icon
                      label: 图标
                      format: svg
                      value-only: true
                    - $formkit: text
                      name: label
                      label: 提示文字
                      value: ""
                    - $formkit: select
                      name: type
                      label: 动作类型
                      value: link
                      options:
                        - label: 跳转链接
                          value: link
                        - label: 主题内置动作
                          value: builtin
                        - label: 自定义函数
                          value: custom
                    - $formkit: url
                      if: "$value.type === undefined || $value.type === '' || $value.type === 'link'"
                      name: url
                      label: 链接地址
                      value: ""
                    - $formkit: switch
                      if: "$value.type === undefined || $value.type === '' || $value.type === 'link'"
                      name: new_tab
                      label: 新标签打开
                      value: true
                    - $formkit: select
                      if: "$value.type === 'builtin'"
                      name: builtin_action
                      label: 内置动作
                      value: search
                      options:
                        - label: 打开搜索
                          value: search
                        - label: 切换深浅色
                          value: theme-toggle
                        - label: 返回顶部
                          value: back-to-top
                        - label: 复制当前链接
                          value: copy-current-url
                        - label: 会员签到
                          value: member-sign-in
                        - label: 文章收藏
                          value: member-favorite
                        - label: 打印页面
                          value: print
                        - label: 打开移动菜单
                          value: open-menu
                        - label: 滚动到评论区
                          value: scroll-comment
                    - $formkit: text
                      if: "$value.type === 'custom'"
                      name: custom_handler
                      label: 自定义函数名
                      value: ""
                    - $formkit: code
                      if: "$value.type === 'custom'"
                      name: payload
                      label: 自定义函数参数
                      language: json
                      value: ""

    - group: home
      label: 首页
      formSchema:
        - $formkit: group
          name: hero
          label: 首屏 Hero
          children:
            - $formkit: switch
              id: home_hero_enabled
              key: home_hero_enabled
              name: enabled
              label: 显示首屏 Hero
              value: true
            - $formkit: text
              if: $get(home_hero_enabled).value === true
              name: label
              label: Hero 标签
              value: 氢视窗
            - $formkit: text
              if: $get(home_hero_enabled).value === true
              name: title
              label: Hero 标题
              value: 探索
            - $formkit: textarea
              if: $get(home_hero_enabled).value === true
              name: description
              label: Hero 描述
              value: 精选的想法、故事和创意，全部汇集于此。如氢气般轻快、简洁、流畅的体验。
            - $formkit: attachment
              if: $get(home_hero_enabled).value === true
              name: cover
              label: Hero 封面
              accepts:
                - image/*
              value: /themes/halo-theme-hydro-minim/assets/images/hero-featured.jpg
            - $formkit: number
              if: $get(home_hero_enabled).value === true
              name: featured_size
              label: Hero 右侧文章数量
              value: 4
              min: 1
              max: 8
              step: 1
            - $formkit: postSelect
              if: $get(home_hero_enabled).value === true
              name: featured_posts
              label: Hero 右侧指定文章
              multiple: true
              value: []
        - $formkit: group
          name: latest
          label: 最新文章
          children:
            - $formkit: switch
              id: home_latest_enabled
              key: home_latest_enabled
              name: enabled
              label: 显示最新文章
              value: true
            - $formkit: text
              if: $get(home_latest_enabled).value === true
              name: title
              label: 最新文章标题
              value: 最新文章
            - $formkit: number
              if: $get(home_latest_enabled).value === true
              name: size
              label: 首页文章展示数量
              value: 3
              min: 1
              max: 6
              step: 1
        - $formkit: group
          name: categories
          label: 分类模块
          children:
            - $formkit: switch
              id: home_categories_enabled
              key: home_categories_enabled
              name: enabled
              label: 显示分类模块
              value: true
            - $formkit: text
              if: $get(home_categories_enabled).value === true
              name: title
              label: 分类模块标题
              value: 分类
            - $formkit: number
              if: $get(home_categories_enabled).value === true
              name: size
              label: 首页分类展示数量
              value: 4
              min: 1
              max: 8
              step: 1
        - $formkit: group
          name: about
          label: 关于模块
          children:
            - $formkit: switch
              id: home_about_enabled
              key: home_about_enabled
              name: enabled
              label: 显示首页关于模块
              value: true
            - $formkit: text
              if: $get(home_about_enabled).value === true
              name: eyebrow
              label: 关于模块标签
              value: About
            - $formkit: text
              if: $get(home_about_enabled).value === true
              name: title
              label: 关于标题
              value: 关于
            - $formkit: text
              if: $get(home_about_enabled).value === true
              name: subtitle
              label: 关于副标题
              value: 艺术的生活家
            - $formkit: textarea
              if: $get(home_about_enabled).value === true
              name: paragraph_1
              label: 关于段落一
              value: 氢风格博客诞生于对简约美学的追求。我们相信，好的设计应该像氢气一样——轻快、简洁、流畅，却蕴含着无限的可能。
            - $formkit: textarea
              if: $get(home_about_enabled).value === true
              name: paragraph_2
              label: 关于段落二
              value: 在这里，我们分享关于设计、科技与生活方式的思考。每一篇文章都是精心策划的创意表达，旨在为读者带来启发与美的享受。
            - $formkit: textarea
              if: $get(home_about_enabled).value === true
              name: paragraph_3
              label: 关于段落三
              value: 33% 的自由，66% 的内容。这是氢视窗的哲学，也是我们对内容创作的坚持——在结构化的框架中，保留艺术的呼吸空间。
            - $formkit: text
              if: $get(home_about_enabled).value === true
              name: readers
              label: 读者展示值
              value: 2.4k
            - $formkit: switch
              if: $get(home_about_enabled).value === true
              name: show_socials
              label: 显示社交链接
              value: true

    - group: content
      label: 内容页面
      formSchema:
        - $formkit: group
          name: post
          label: 文章详情
          children:
            - $formkit: switch
              name: show_cover
              label: 显示文章封面 Hero
              value: true
            - $formkit: switch
              name: show_author
              label: 显示作者信息
              value: true
            - $formkit: switch
              name: enable_reward
              label: 启用赞赏区
              value: false
            - $formkit: attachment
              name: reward_qr
              label: 赞赏二维码
              accepts:
                - image/*
              width: 180px
              aspectRatio: "1/1"
              value: ""
            - $formkit: switch
              name: show_neighbors
              label: 显示上一篇/下一篇
              value: true
            - $formkit: switch
              name: enable_comment
              label: 启用评论区
              value: true
            - $formkit: switch
              name: enable_toc
              label: 启用文章目录
              value: true
            - $formkit: switch
              name: enable_reading_progress
              label: 启用阅读进度
              value: true
            - $formkit: switch
              name: enable_action_rail
              label: 启用阅读操作栏
              value: true
            - $formkit: switch
              name: enable_upvote
              label: 启用点赞动作
              value: true
            - $formkit: switch
              name: enable_share
              label: 启用分享动作
              value: true
            - $formkit: switch
              name: enable_related_posts
              label: 启用相关文章
              value: true
            - $formkit: number
              name: related_posts_size
              label: 相关文章数量
              value: 3
              min: 1
              max: 6
              step: 1
        - $formkit: group
          name: page
          label: 独立页面
          children:
            - $formkit: switch
              name: show_cover
              label: 显示页面封面
              value: true
            - $formkit: switch
              name: show_publish_time
              label: 显示发布时间
              value: true
            - $formkit: switch
              name: enable_comment
              label: 启用评论区
              value: true
            - $formkit: switch
