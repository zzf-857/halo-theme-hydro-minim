apiVersion: theme.halo.run/v1alpha1
kind: Theme
metadata:
  name: halo-theme-hydro-minim
spec:
  displayName: 氢·简
  author:
    name: Lywq
    website: https://blog.muyin.site
  description: Hydro-Minim，氢系列首款极简 Halo 主题，以轻快、留白和流畅动效呈现内容。
  logo: /themes/halo-theme-hydro-minim/assets/brand/hydro-minim-mark.svg
  homepage: https://blog.muyin.site
  repo: https://github.com/liuyiwuqing/halo-theme-hydro-minim
  issues: https://github.com/liuyiwuqing/halo-theme-hydro-minim/issues
  settingName: "halo-theme-hydro-minim-setting"
  configMapName: "halo-theme-hydro-minim-configMap"
  version: 1.0.0-beta2
  requires: ">=2.24.0"
  customTemplates:
    page:
      - name: Hydro 关于页
        description: 氢风格关于页，展示站点统计、正文和社交链接
        file: page_about.html
      - name: Hydro 社交聚合页
        description: 个人多链接社交聚合名片页，支持一键复制与二维码长按扫码
        file: page_social.html
      - name: Hydro 个人简历
        description: 氢风格个人简历，展示个人能力、专业技能和作品展示
        file: page_resume.html
      - name: Hydro 追番页
        description: 追番插件页面模板；未安装插件时显示安装提示
        file: bangumis.html
      - name: Hydro 文档中心
        description: Docsme 文档中心入口模板；文档详情仍由 Docsme 路由提供
        file: docs.html
      - name: Hydro 装备页
        description: 装备插件页面模板；未安装插件时显示安装提示
        file: equipments.html
      - name: Hydro 朋友圈页
        description: 朋友圈插件页面模板；未安装插件时显示安装提示
        file: friends.html
      - name: Hydro 瞬间页
        description: 瞬间插件页面模板；未安装插件时显示安装提示
        file: moments.html
      - name: Hydro 图库页
        description: 图库插件页面模板；未安装插件时显示安装提示
        file: photos.html
      - name: Hydro Steam 页
        description: Steam 插件页面模板；未安装插件时显示安装提示
        file: steam.html
  license:
    - name: "GPL-3.0"
      url: "https://www.gnu.org/licenses/gpl-3.0.html"
