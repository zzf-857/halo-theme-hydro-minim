<!doctype html>
<html
  xmlns:th="https://www.thymeleaf.org"
  th:replace="~{gateway_fragments/layout :: layout(title = |#{auth.passwordReset.reset.title(${username})} - ${site.title}|, head = null, body = ~{::body})}"
>
  <th:block th:fragment="body">
    <div class="gateway-wrapper password-reset-page-wrapper">
      <div th:replace="~{gateway_fragments/common::haloLogo}"></div>
      <div class="halo-form-wrapper">
        <h1 class="form-title" th:text="#{auth.passwordReset.reset.title(${username})}">重置密码</h1>
        <p class="hydro-auth-note" th:if="${username}" th:text="#{auth.passwordReset.reset.description(${username})}">
          正在设置新的登录密码。
        </p>
        <form th:replace="~{gateway_fragments/password_reset_email_reset::form}"></form>
      </div>
      <div th:replace="~{gateway_fragments/common::signupNoticeContent}"></div>
      <div th:replace="~{gateway_fragments/common::returnToSiteContent}"></div>
      <div th:replace="~{gateway_fragments/common::languageSwitcher}"></div>
    </div>
  </th:block>
</html>
