<section id="articles" class="hydro-section hydro-latest" data-reveal-section>
  <div class="hydro-section-heading">
    <h2 class="hydro-section-title" data-reveal-title th:text="${theme.config.home?.latest?.title ?: '最新文章'}">
      最新文章
    </h2>
  </div>

  <div
    class="hydro-container"
    th:with="
      latestSizeText=${theme.config.home?.latest?.size == null ? '' : #strings.trim('' + theme.config.home.latest.size)},
      latestSizeRaw=${latestSizeText.matches('^[0-9]{1,3}$') ? T(java.lang.Integer).parseInt(latestSizeText) : 3},
      latestSize=${latestSizeRaw < 1 ? 3 : latestSizeRaw}
    "
  >
    <div
      class="hydro-article-grid"
      th:classappend="${posts.total == 1} ? ' hydro-article-grid--single' : ''"
      th:if="${posts.total gt 0}"
    >
      <article
        class="hydro-card"
        data-tilt-card
        th:each="post,stat : ${posts.items}"
        th:if="${stat.index < latestSize}"
        th:with="
          rawFallbackCover=${stat.index % 3 == 0 ? theme.config.identity?.defaults?.article_cover_1 : (stat.index % 3 == 1 ? theme.config.identity?.defaults?.article_cover_2 : theme.config.identity?.defaults?.article_cover_3)},
          fallbackCover=${#strings.isEmpty(rawFallbackCover) ? #theme.assets('/images/article-1.jpg') : rawFallbackCover},
          cover=${#strings.isEmpty(post.spec.cover) ? fallbackCover : post.spec.cover},
          optimizedCover=${#strings.contains(cover, 'images.unsplash.com') ? cover + (#strings.contains(cover, '?') ? '&w=960&fit=crop&auto=format' : '?w=960&fit=crop&auto=format') : cover},
          optimizedFallbackCover=${#strings.contains(fallbackCover, 'images.unsplash.com') ? fallbackCover + (#strings.contains(fallbackCover, '?') ? '&w=960&fit=crop&auto=format' : '?w=960&fit=crop&auto=format') : fallbackCover}
        "
      >
        <a th:href="@{${post.status.permalink}}">
          <div class="hydro-card__media" data-progressive-media>
            <img
              th:src="${optimizedCover}"
              th:alt="${post.spec.title}"
              width="960"
              height="640"
              loading="eager"
              decoding="async"
              fetchpriority="low"
              data-prewarm-image
              data-progressive-image
              th:attr="data-fallback-cover=${optimizedFallbackCover}"
            />
            <div class="hydro-card__shade" aria-hidden="true"></div>
            <span
              class="hydro-card__badge"
              th:text="${not #lists.isEmpty(post.categories) ? post.categories[0].spec.displayName : '文章'}"
            >
              文章
            </span>
            <time
              class="hydro-card__date"
              aria-label="文章发布时间"
              th:datetime="${#dates.format(post.spec.publishTime, 'yyyy-MM-dd')}"
              th:text="${#dates.format(post.spec.publishTime, 'yyyy.MM.dd')}"
              >2024.01.15</time
            >
            <div class="hydro-card__metrics" aria-label="文章互动统计">
              <span th:text="|${theme.config.content?.post?.visit_label ?: '阅读'} ${post.stats.visit ?: 0}|"
                >阅读 0</span
              >
              <span th:text="|${theme.config.content?.post?.comment_label ?: '评论'} ${post.stats.comment ?: 0}|"
                >评论 0</span
              >
              <span th:text="|${theme.config.content?.post?.upvote_label ?: '点赞'} ${post.stats.upvote ?: 0}|"
                >点赞 0</span
              >
            </div>
            <span class="hydro-card__arrow" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path d="M7 17 17 7M8 7h9v9"></path>
              </svg>
            </span>
          </div>
          <div class="hydro-card__body">
            <h3 th:text="${post.spec.title}">数字设计的未来</h3>
            <p th:text="${post.status.excerpt}">探索 AI 与设计的融合，以及数字创意的新边界。</p>
          </div>
        </a>
      </article>
    </div>

    <div th:if="${posts.total == 0}" class="hydro-empty" th:text="${'还没有发布文章。'}">还没有发布文章。</div>

    <div class="hydro-section-action">
      <a class="hydro-pill-link" th:href="@{/archives}">
        <span>查看全部文章</span>
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M7 17 17 7M8 7h9v9"></path>
        </svg>
      </a>
    </div>
  </div>
</section>
