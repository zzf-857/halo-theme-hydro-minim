<th:block
  th:with="
    navigationConfig=${theme.config.navigation?.floating},
    serverRequest=${#ctx.getVariable('org.springframework.web.reactive.function.server.RouterFunctions.request')},
    currentTemplateId=${_templateId},
    currentPermalink=${post != null ? post.status.permalink : (singlePage != null ? singlePage.status.permalink : (category != null ? category.status.permalink : (tag != null ? tag.status.permalink : (author != null ? author.status.permalink : (docTree != null ? docTree.status.permalink : (project != null ? (project.getClass().getName() == 'site.muyin.portfolio.scheme.Project' ? ('/projects/' + project.slug) : project.status.permalink) : null))))))},
    currentRequestPath=${serverRequest == null ? null : serverRequest.path()},
    siteUrl=${site == null ? null : site.url}
  "
>
  <th:block
    th:with="
      currentTemplateIdText=${currentTemplateId == null ? '' : #strings.trim('' + currentTemplateId)},
      currentTemplatePathText=${#strings.isEmpty(currentTemplateIdText) ? '' : ('/' + (#strings.startsWith(currentTemplateIdText, 'page_') ? #strings.substringAfter(currentTemplateIdText, 'page_') : currentTemplateIdText))},
      currentPermalinkText=${currentPermalink == null ? '' : #strings.trim('' + currentPermalink)},
      currentRequestPathText=${currentRequestPath == null ? '' : #strings.trim('' + currentRequestPath)},
      siteUrlText=${siteUrl == null ? '' : #strings.trim('' + siteUrl)},
      siteUrlBase=${#strings.endsWith(siteUrlText, '/') ? #strings.substring(siteUrlText, 0, #strings.length(siteUrlText) - 1) : siteUrlText}
    "
  >
    <th:block
      th:with="
        fabProfiles=${navigationConfig?.fab_profiles},
        templateFabProfiles=${fabProfiles == null ? null : fabProfiles.?[
          match_type == 'template'
          and match_value != null
          and #strings.trim('' + match_value) == #ctx.getVariable('currentTemplateIdText')
        ]},
        permalinkFabProfiles=${fabProfiles == null ? null : fabProfiles.?[
          match_type == 'permalink'
          and match_value != null
          and not #strings.isEmpty(#strings.trim('' + match_value))
          and (
            (
              not #strings.isEmpty(#ctx.getVariable('currentPermalinkText'))
              and (
                #strings.trim('' + match_value) == #ctx.getVariable('currentPermalinkText')
                or (#strings.trim('' + match_value) + '/') == #ctx.getVariable('currentPermalinkText')
                or #strings.trim('' + match_value) == (#ctx.getVariable('currentPermalinkText') + '/')
                or ('/' + #strings.trim('' + match_value)) == #ctx.getVariable('currentPermalinkText')
                or ('/' + #strings.trim('' + match_value) + '/') == #ctx.getVariable('currentPermalinkText')
                or (
                  not #strings.isEmpty(#ctx.getVariable('siteUrlBase'))
                  and (
                    (#ctx.getVariable('siteUrlBase') + #strings.trim('' + match_value)) == #ctx.getVariable('currentPermalinkText')
                    or (#ctx.getVariable('siteUrlBase') + #strings.trim('' + match_value) + '/') == #ctx.getVariable('currentPermalinkText')
                    or (#ctx.getVariable('siteUrlBase') + '/' + #strings.trim('' + match_value)) == #ctx.getVariable('currentPermalinkText')
                    or (#ctx.getVariable('siteUrlBase') + '/' + #strings.trim('' + match_value) + '/') == #ctx.getVariable('currentPermalinkText')
                    or #strings.trim('' + match_value) == (#ctx.getVariable('siteUrlBase') + #ctx.getVariable('currentPermalinkText'))
                    or #strings.trim('' + match_value) == (#ctx.getVariable('siteUrlBase') + #ctx.getVariable('currentPermalinkText') + '/')
                    or #strings.trim('' + match_value) == (#ctx.getVariable('siteUrlBase') + '/' + #ctx.getVariable('currentPermalinkText'))
                    or #strings.trim('' + match_value) == (#ctx.getVariable('siteUrlBase') + '/' + #ctx.getVariable('currentPermalinkText') + '/')
                  )
                )
              )
            )
            or (
              not #strings.isEmpty(#ctx.getVariable('currentTemplatePathText'))
              and (
                #strings.trim('' + match_value) == #ctx.getVariable('currentTemplatePathText')
                or (#strings.trim('' + match_value) + '/') == #ctx.getVariable('currentTemplatePathText')
                or #strings.trim('' + match_value) == (#ctx.getVariable('currentTemplatePathText') + '/')
                or ('/' + #strings.trim('' + match_value)) == #ctx.getVariable('currentTemplatePathText')
                or ('/' + #strings.trim('' + match_value) + '/') == #ctx.getVariable('currentTemplatePathText')
              )
            )
            or (
              not #strings.isEmpty(#ctx.getVariable('currentRequestPathText'))
              and (
                #strings.trim('' + match_value) == #ctx.getVariable('currentRequestPathText')
                or (#strings.trim('' + match_value) + '/') == #ctx.getVariable('currentRequestPathText')
                or #strings.trim('' + match_value) == (#ctx.getVariable('currentRequestPathText') + '/')
                or ('/' + #strings.trim('' + match_value)) == #ctx.getVariable('currentRequestPathText')
                or ('/' + #strings.trim('' + match_value) + '/') == #ctx.getVariable('currentRequestPathText')
                or (
                  not #strings.isEmpty(#ctx.getVariable('siteUrlBase'))
                  and (
                    (#ctx.getVariable('siteUrlBase') + #strings.trim('' + match_value)) == #ctx.getVariable('currentRequestPathText')
                    or (#ctx.getVariable('siteUrlBase') + #strings.trim('' + match_value) + '/') == #ctx.getVariable('currentRequestPathText')
                    or (#ctx.getVariable('siteUrlBase') + '/' + #strings.trim('' + match_value)) == #ctx.getVariable('currentRequestPathText')
                    or (#ctx.getVariable('siteUrlBase') + '/' + #strings.trim('' + match_value) + '/') == #ctx.getVariable('currentRequestPathText')
                    or #strings.trim('' + match_value) == (#ctx.getVariable('siteUrlBase') + #ctx.getVariable('currentRequestPathText'))
                    or #strings.trim('' + match_value) == (#ctx.getVariable('siteUrlBase') + #ctx.getVariable('currentRequestPathText') + '/')
                    or #strings.trim('' + match_value) == (#ctx.getVariable('siteUrlBase') + '/' + #ctx.getVariable('currentRequestPathText'))
                    or #strings.trim('' + match_value) == (#ctx.getVariable('siteUrlBase') + '/' + #ctx.getVariable('currentRequestPathText') + '/')
                  )
                )
              )
            )
          )
        ]},
        fallbackFabProfiles=${fabProfiles == null ? null : fabProfiles.?[match_type == 'all']},
        specificFabProfiles=${permalinkFabProfiles != null and not #lists.isEmpty(permalinkFabProfiles) ? permalinkFabProfiles : templateFabProfiles},
        selectedFabProfile=${specificFabProfiles != null and not #lists.isEmpty(specificFabProfiles) ? specificFabProfiles[0] : (fallbackFabProfiles != null and not #lists.isEmpty(fallbackFabProfiles) ? fallbackFabProfiles[0] : null)},
        selectedFabItems=${selectedFabProfile != null ? selectedFabProfile.items : null},
        fabItems=${selectedFabItems != null and not #lists.isEmpty(selectedFabItems) ? selectedFabItems : navigationConfig?.fab_items},
        hasFabItems=${fabItems != null and not #lists.isEmpty(fabItems)},
        showFab=${navigationConfig == null or navigationConfig.fab_enabled == true},
        showBackToTop=${navigationConfig == null or navigationConfig.show_back_to_top != false}
      "
    >
      <div
        class="hydro-fab-group"
        th:if="${(showFab and hasFabItems) or showBackToTop}"
        th:attr="aria-label=${navigationConfig?.fab_label ?: '快捷操作'}"
      >
        <div class="hydro-fab-menu" data-hydro-fab th:if="${showFab and hasFabItems}">
          <div class="hydro-fab-items">
            <th:block th:each="item : ${fabItems}">
              <th:block
                th:with="itemType=${#strings.isEmpty(item.type) ? 'link' : item.type}, itemLabel=${#strings.isEmpty(item.label) ? '快捷操作' : item.label}"
              >
                <a
                  th:if="${itemType == 'link'}"
                  class="hydro-fab-item"
                  th:href="${#strings.isEmpty(item.url) ? '#' : item.url}"
                  th:target="${item.new_tab == true ? '_blank' : '_self'}"
                  th:attr="aria-label=${itemLabel},title=${itemLabel},data-hydro-fab-action=${itemType}"
                  rel="noopener noreferrer"
                >
                  <th:block th:utext="${item.icon}" />
                </a>
                <button
                  th:unless="${itemType == 'link'}"
                  class="hydro-fab-item"
                  type="button"
                  th:attr="aria-label=${itemLabel},title=${itemLabel},data-hydro-fab-action=${itemType},data-hydro-fab-builtin=${item.builtin_action},data-hydro-fab-handler=${item.custom_handler},data-hydro-fab-payload=${item.payload}"
                >
                  <th:block th:utext="${item.icon}" />
                </button>
              </th:block>
            </th:block>
          </div>
          <button
            class="hydro-fab-trigger"
            data-hydro-fab-trigger
            th:if="${showFab and hasFabItems}"
            th:attr="aria-label=${navigationConfig?.fab_label ?: '快捷操作'}"
            aria-expanded="false"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <line x1="12" y1="5" x2="12" y2="19" />
              <line x1="5" y1="12" x2="19" y2="12" />
            </svg>
          </button>
        </div>
        <button
          th:if="${showBackToTop}"
          class="hydro-back-to-top"
          data-hydro-back-to-top
          th:attr="aria-label=${navigationConfig?.back_to_top_label ?: '返回顶部'},title=${navigationConfig?.back_to_top_label ?: '返回顶部'}"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <polyline points="18 15 12 9 6 15" />
          </svg>
        </button>
      </div>
    </th:block>
  </th:block>
</th:block>
