<!doctype html>
<html
  th:lang="${#locale.toLanguageTag}"
  th:style="|--hydro-light-bg:${theme.config.presentation?.color?.background_color ?: '#F3F3F3'}; --hydro-dark-bg:${theme.config.presentation?.color?.dark_background_color ?: '#101112'}; --hydro-coral-light:${theme.config.presentation?.color?.accent_color ?: '#FF6B6B'}; --hydro-coral-dark:${theme.config.presentation?.color?.dark_accent_color ?: theme.config.presentation?.color?.accent_color ?: '#FF8A8A'};|"
  th:attr="
    data-theme-default=${theme.config.presentation?.color?.color_scheme ?: 'auto'},
    data-hydro-smooth-scroll=${theme.config.presentation?.motion == null or theme.config.presentation.motion.smooth_scroll != false},
    data-hydro-motion=${(theme.config.presentation?.motion == null or theme.config.presentation.motion.enable_motion != false) ? 'on' : 'off'},
    data-hydro-theme-transition=${theme.config.presentation?.motion == null or theme.config.presentation.motion.enable_theme_transition != false},
    data-hydro-hero-motion=${theme.config.presentation?.motion == null or theme.config.presentation.motion.enable_hero_motion != false},
    data-hydro-card-hover=${theme.config.presentation?.motion == null or theme.config.presentation.motion.enable_card_hover != false},
    data-hydro-lightbox=${theme.config.presentation?.motion == null or theme.config.presentation.motion.enable_lightbox != false}
  "
  xmlns:th="http://www.thymeleaf.org"
>
  <head>
    <meta charset="UTF-8" />
<meta http-equiv="X-UA-Compatible" content="IE=edge" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=2" />
<meta
  name="theme-color"
  media="(prefers-color-scheme: light)"
  th:content="${theme.config.presentation?.color?.background_color ?: '#F3F3F3'}"
/>
<meta
  name="theme-color"
  media="(prefers-color-scheme: dark)"
  th:content="${theme.config.presentation?.color?.dark_background_color ?: '#101112'}"
/>
<link
  rel="icon"
  type="image/svg+xml"
  th:with="faviconHref = ${site.favicon ?: (theme.config.identity?.brand == null || #strings.isEmpty(theme.config.identity.brand.logo) ? #theme.assets('/brand/hydro-minim-mark.svg') : theme.config.identity.brand.logo)}"
  th:href="${faviconHref}"
/>
<th:block
  th:if="${not #strings.isEmpty(theme.config.advanced?.inject?.head_html)}"
  th:utext="${theme.config.advanced.inject.head_html}"
/>
<style
  th:if="${not #strings.isEmpty(theme.config.advanced?.inject?.code_css)}"
  th:utext="${theme.config.advanced.inject.code_css}"
></style>
<script th:inline="javascript">
  (() => {
    const root = document.documentElement;
    const defaultMode =
      root.dataset.themeDefault || /*[[${theme.config.presentation?.color?.color_scheme ?: 'auto'}]]*/ "auto";
    let storedMode = null;
    try {
      storedMode = window.localStorage.getItem("hydro-color-scheme");
    } catch {
      storedMode = null;
    }
    const requestedMode = storedMode || defaultMode || "auto";
    const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
    const resolvedMode = requestedMode === "dark" || (requestedMode === "auto" && prefersDark) ? "dark" : "light";

    root.dataset.hydroTheme = resolvedMode;
    root.dataset.colorScheme = requestedMode;
    root.classList.toggle("dark", requestedMode === "dark");
    root.classList.toggle("light", requestedMode === "light");
    root.classList.toggle("color-scheme-dark", requestedMode === "dark");
    root.classList.toggle("color-scheme-light", requestedMode === "light");
    root.classList.toggle("color-scheme-auto", requestedMode === "auto");
  })();
</script>

    
    <title th:text="|${theme.config.plugins?.photos?.title ?: '图库'} - ${site.title}|">图库</title>
  
    <script type="module" crossorigin src="/themes/halo-theme-hydro-minim/assets/modulepreload-polyfill-ChbB40kX.js"></script>
    <script type="module" crossorigin src="/themes/halo-theme-hydro-minim/assets/vendor~archives~author~bangumis~categories~category~doc-catalog~doc~docs~equipments~friends~cc8q22x5-CN2a1FAu.js"></script>
    <script type="module" crossorigin src="/themes/halo-theme-hydro-minim/assets/main-BYY9PAZM.js"></script>
    <link rel="stylesheet" crossorigin href="/themes/halo-theme-hydro-minim/assets/main-BHdzlOhE.css">
  </head>
  <body
    class="hydro-page"
    th:attr="
      data-smooth-scroll=${theme.config.presentation?.motion == null or theme.config.presentation.motion.smooth_scroll != false},
      data-enable-motion=${theme.config.presentation?.motion == null or theme.config.presentation.motion.enable_motion != false},
      data-theme-transition=${theme.config.presentation?.motion == null or theme.config.presentation.motion.enable_theme_transition != false},
      data-enable-hero-motion=${theme.config.presentation?.motion == null or theme.config.presentation.motion.enable_hero_motion != false},
      data-enable-card-hover=${theme.config.presentation?.motion == null or theme.config.presentation.motion.enable_card_hover != false},
      data-enable-lightbox=${theme.config.presentation?.motion == null or theme.config.presentation.motion.enable_lightbox != false},
      data-theme-to-light-label=${theme.config.presentation?.theme_toggle?.to_light_label ?: '切换为浅色模式'},
      data-theme-to-dark-label=${theme.config.presentation?.theme_toggle?.to_dark_label ?: '切换为深色模式'},
      data-allow-color-switch=${theme.config.navigation?.header == null or theme.config.navigation.header.allow_color_switch != false},
      data-member-plugin-available=${pluginFinder.available('PluginMember')},
      data-member-authenticated=${#authorization.expression('isAuthenticated()')},
      data-back-to-top-threshold=${theme.config.navigation?.floating?.back_to_top_threshold ?: 100},
      data-post-share-copied-text=${theme.config.content?.post?.share_copied_text ?: '已复制'},
      data-post-share-copy-prompt-title=${theme.config.content?.post?.copy_prompt_title ?: '复制链接'},
      data-post-upvote-error-text=${theme.config.content?.post?.upvote_error_text ?: '点赞失败，请稍后再试'},
      data-moment-upvote-error-text=${theme.config.plugins?.moments?.upvote_error_text ?: (theme.config.content?.post?.upvote_error_text ?: '点赞失败，请稍后再试')},
      data-doc-toc-empty-text=${theme.config.plugins?.docs?.toc_empty_text ?: '无目录'}
    "
  >
    <div
      th:if="${theme.config.presentation?.motion == null or theme.config.presentation.motion.show_grain != false}"
      class="grain-overlay"
      aria-hidden="true"
    ></div>

    <th:block th:replace="~{modules/header}" />

    <main>
      
  

  <section class="hydro-list-hero">
    <div class="hydro-container">
      <p th:text="${theme.config.plugins?.photos?.eyebrow ?: 'Gallery'}">Gallery</p>
      <h1 th:text="${theme.config.plugins?.photos?.title ?: '图库'}">图库</h1>
      <span th:text="${theme.config.plugins?.photos?.description ?: '用镜头定格光影，每一帧都是时间的切片。'}">
        用镜头定格光影，每一帧都是时间的切片。
      </span>
    </div>
  </section>

  <section class="hydro-photos-section">
    <div
      class="hydro-container"
      th:with="
        hasPhotosPlugin=${pluginFinder.available('PluginPhotos') or pluginFinder.available('plugin-photos')},
        isSinglePageRoute=${singlePage != null},
        pageBaseUrl=${isSinglePageRoute ? singlePage.status.permalink : '/photos'},
        currentGroup=${param.group != null and not #lists.isEmpty(param.group) ? param.group[0] : null},
        photosPageSizeText=${theme.config.plugins?.photos?.page_size == null ? '' : #strings.trim('' + theme.config.plugins.photos.page_size)},
        photosPageSizeRaw=${photosPageSizeText.matches('^[0-9]{1,3}$') ? T(java.lang.Integer).parseInt(photosPageSizeText) : 30},
        photosPageSize=${photosPageSizeRaw < 1 ? 30 : photosPageSizeRaw},
        photoGroups=${hasPhotosPlugin and photoFinder != null ? photoFinder.groupBy() : null},
        photosData=${photos != null ? photos : (hasPhotosPlugin and photoFinder != null ? photoFinder.list(1, photosPageSize, currentGroup) : null)},
        hasPhotosData=${photosData != null and photosData.items != null and not #lists.isEmpty(photosData.items)}"
    >
      <div class="hydro-plugin-notice" th:if="${not hasPhotosPlugin}">
        <strong th:text="${theme.config.plugins?.photos?.install_title ?: '需要安装图库插件'}">需要安装图库插件</strong>
        <span
          class="hydro-plugin-notice__body"
          th:text="${theme.config.plugins?.photos?.install_text ?: '需要安装并启用 PluginPhotos。在 Halo Console -> 应用市场搜索“图库管理”，创建分组和图片后这里会展示瀑布流。'}"
          >需要安装并启用 PluginPhotos。在 Halo Console ->
          应用市场搜索“图库管理”，创建分组和图片后这里会展示瀑布流。</span
        >
        <a
          class="hydro-plugin-install-link"
          th:href="${theme.config.plugins?.photos?.install_link ?: 'https://www.halo.run/store/apps/app-BmQJW'}"
          target="_blank"
          rel="noreferrer noopener"
          th:text="${theme.config.plugins?.photos?.install_link_label ?: '应用市场'}"
          >应用市场</a
        >
      </div>

      <!-- 分组 Tab 导航 -->
      <nav class="hydro-photos-tabs" th:if="${hasPhotosPlugin}" aria-label="图库分组">
        <a
          th:href="@{${pageBaseUrl}}"
          class="hydro-photos-tab"
          th:classappend="${#lists.isEmpty(param.group)} ? ' is-active' : ''"
          th:text="${theme.config.plugins?.photos?.all_group_label ?: '全部'}"
          >全部</a
        >
        <a
          th:each="group : ${photoGroups}"
          th:href="@{${pageBaseUrl}(group=${group.metadata.name})}"
          class="hydro-photos-tab"
          th:classappend="${#lists.contains(param.group, group.metadata.name)} ? ' is-active' : ''"
          th:text="${group.spec.displayName}"
        ></a>
      </nav>

      <!-- 瀑布流图片 -->
      <div class="hydro-photos-masonry" th:if="${hasPhotosData}">
        <div class="hydro-photo-card" th:each="photo : ${photosData.items}">
          <button
            class="hydro-photo-card__inner"
            th:attr="data-src=${photo.spec.url},data-alt=${photo.spec.displayName},data-media-error-text=${photo.spec.displayName ?: '图片暂时不可见'}"
            data-progressive-media
            data-lightbox-trigger
          >
            <img
              th:src="${thumbnail.gen(photo.spec.url, 'm')}"
              th:srcset="|${thumbnail.gen(photo.spec.url, 's')} 420w, ${thumbnail.gen(photo.spec.url, 'm')} 760w, ${thumbnail.gen(photo.spec.url, 'l')} 1160w|"
              sizes="(max-width: 720px) calc((100vw - 2.75rem) / 2), (max-width: 1100px) calc((100vw - 5rem) / 2), 31vw"
              th:alt="${photo.spec.displayName}"
              loading="lazy"
              decoding="async"
              data-progressive-image
            />
            <div class="hydro-photo-card__overlay">
              <div class="hydro-photo-card__info">
                <h3
                  th:if="${not #strings.isEmpty(photo.spec.displayName)}"
                  th:text="${photo.spec.displayName}"
                  class="hydro-photo-card__title"
                >
                  图片名称
                </h3>
                <p
                  th:if="${not #strings.isEmpty(photo.spec.description)}"
                  th:text="${photo.spec.description}"
                  class="hydro-photo-card__desc"
                ></p>
              </div>
            </div>
          </button>
        </div>
      </div>

      <div th:if="${not hasPhotosPlugin}" class="hydro-plugin-empty hydro-plugin-empty--install">
        <span th:text="${theme.config.plugins?.photos?.eyebrow ?: 'Gallery'}">Gallery</span>
        <strong th:text="${theme.config.plugins?.photos?.install_title ?: '需要安装图库插件'}">需要安装图库插件</strong>
        <p
          th:text="${theme.config.plugins?.photos?.install_text ?: '请安装 PluginPhotos，路径：Halo Console -> 应用市场 -> 搜索“图库管理”。'}"
        >
          请安装 PluginPhotos，路径：Halo Console -> 应用市场 -> 搜索“图库管理”。
        </p>
        <a
          class="hydro-plugin-install-link"
          th:href="${theme.config.plugins?.photos?.install_link ?: 'https://www.halo.run/store/apps/app-BmQJW'}"
          target="_blank"
          rel="noreferrer noopener"
          th:text="${theme.config.plugins?.photos?.install_link_label ?: '查看插件'}"
          >查看插件</a
        >
      </div>

      <div
        th:if="${hasPhotosPlugin and not hasPhotosData}"
        class="hydro-empty"
        th:text="${theme.config.plugins?.photos?.empty_available_text ?: (theme.config.plugins?.photos?.empty_text ?: '暂无图片。')}"
      >
        暂无图片。
      </div>

      <nav
        class="hydro-pagination"
        th:if="${not isSinglePageRoute and photosData != null and (photosData.hasPrevious() or photosData.hasNext())}"
      >
        <a
          th:if="${photosData.hasPrevious()}"
          th:href="@{${photosData.prevUrl}}"
          th:text="${theme.config.navigation?.pagination?.previous_label ?: '上一页'}"
          >上一页</a
        >
        <span th:text="|${photosData.page} / ${photosData.totalPages}|">1 / 1</span>
        <a
          th:if="${photosData.hasNext()}"
          th:href="@{${photosData.nextUrl}}"
          th:text="${theme.config.navigation?.pagination?.next_label ?: '下一页'}"
          >下一页</a
        >
      </nav>

      <section
        id="comment"
        class="hydro-plugin-comments"
        th:if="${(theme.config.plugins?.photos == null or theme.config.plugins.photos.enable_comment != false) and haloCommentEnabled and singlePage != null}"
      >
        <h2 th:text="${theme.config.plugins?.photos?.comments_title ?: '评论'}">评论</h2>
        <halo:comment group="content.halo.run" kind="SinglePage" th:attr="name=${singlePage.metadata.name}" />
      </section>
    </div>
  </section>

  <!-- 灯箱 -->
  <div class="hydro-lightbox" data-lightbox aria-hidden="true">
    <button class="hydro-lightbox__close" data-lightbox-close aria-label="关闭">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12"></path></svg>
    </button>
    <button class="hydro-lightbox__prev" data-lightbox-prev aria-label="上一张">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 18 9 12l6-6"></path></svg>
    </button>
    <img class="hydro-lightbox__img" data-lightbox-img src="" alt="" />
    <button class="hydro-lightbox__next" data-lightbox-next aria-label="下一张">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 18l6-6-6-6"></path></svg>
    </button>
    <div class="hydro-lightbox__counter" data-lightbox-counter></div>
  </div>

    </main>

    <th:block th:replace="~{modules/footer}" />

    <!-- FAB + 返回顶部 -->
    <th:block th:replace="~{modules/fab}" />

    <halo:footer />
    <th:block
      th:if="${not #strings.isEmpty(theme.config.advanced?.inject?.footer_html)}"
      th:utext="${theme.config.advanced.inject.footer_html}"
    />
    <script
      th:if="${not #strings.isEmpty(theme.config.advanced?.inject?.code_js)}"
      th:utext="${theme.config.advanced.inject.code_js}"
    ></script>
  </body>
</html>
