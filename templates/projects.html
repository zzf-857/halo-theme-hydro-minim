<!doctype html>
<html
  th:lang="${#locale.toLanguageTag}"
  th:style="|--hydro-light-bg:${theme.config.presentation?.color?.background_color ?: '#F3F3F3'}; --hydro-dark-bg:${theme.config.presentation?.color?.dark_background_color ?: '#101112'}; --hydro-coral-light:${theme.config.presentation?.color?.accent_color ?: '#FF6B6B'}; --hydro-coral-dark:${theme.config.presentation?.color?.dark_accent_color ?: theme.config.presentation?.color?.accent_color ?: '#FF8A8A'};|"
  th:attr="
    data-theme-default=${theme.config.presentation?.color?.color_scheme ?: 'auto'},
    data-hydro-smooth-scroll=${theme.config.presentation?.motion == null or theme.config.presentation.motion.smooth_scroll != false},
    data-hydro-motion=${(theme.config.presentation?.motion == null or theme.config.presentation.motion.enable_motion != false) ? 'on' : 'off'},
    data-hydro-theme-transition=${theme.config.presentation?.motion == null or theme.config.presentation.motion.enable_theme_transition != false},
    data-hydro-hero-motion=${theme.config.presentation?.motion == null or theme.config.presentation.motion.enable_hero_motion != false},
    data-hydro-card-hover=${theme.config.presentation?.motion == null or theme.config.presentation.motion.enable_card_hover != false},
    data-hydro-lightbox=${theme.config.presentation?.motion == null or theme.config.presentation.motion.enable_lightbox != false}
  "
  xmlns:th="http://www.thymeleaf.org"
>
  <head>
    <meta charset="UTF-8" />
<meta http-equiv="X-UA-Compatible" content="IE=edge" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=2" />
<meta
  name="theme-color"
  media="(prefers-color-scheme: light)"
  th:content="${theme.config.presentation?.color?.background_color ?: '#F3F3F3'}"
/>
<meta
  name="theme-color"
  media="(prefers-color-scheme: dark)"
  th:content="${theme.config.presentation?.color?.dark_background_color ?: '#101112'}"
/>
<link
  rel="icon"
  type="image/svg+xml"
  th:with="faviconHref = ${site.favicon ?: (theme.config.identity?.brand == null || #strings.isEmpty(theme.config.identity.brand.logo) ? #theme.assets('/brand/hydro-minim-mark.svg') : theme.config.identity.brand.logo)}"
  th:href="${faviconHref}"
/>
<th:block
  th:if="${not #strings.isEmpty(theme.config.advanced?.inject?.head_html)}"
  th:utext="${theme.config.advanced.inject.head_html}"
/>
<style
  th:if="${not #strings.isEmpty(theme.config.advanced?.inject?.code_css)}"
  th:utext="${theme.config.advanced.inject.code_css}"
></style>
<script th:inline="javascript">
  (() => {
    const root = document.documentElement;
    const defaultMode =
      root.dataset.themeDefault || /*[[${theme.config.presentation?.color?.color_scheme ?: 'auto'}]]*/ "auto";
    let storedMode = null;
    try {
      storedMode = window.localStorage.getItem("hydro-color-scheme");
    } catch {
      storedMode = null;
    }
    const requestedMode = storedMode || defaultMode || "auto";
    const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
    const resolvedMode = requestedMode === "dark" || (requestedMode === "auto" && prefersDark) ? "dark" : "light";

    root.dataset.hydroTheme = resolvedMode;
    root.dataset.colorScheme = requestedMode;
    root.classList.toggle("dark", requestedMode === "dark");
    root.classList.toggle("light", requestedMode === "light");
    root.classList.toggle("color-scheme-dark", requestedMode === "dark");
    root.classList.toggle("color-scheme-light", requestedMode === "light");
    root.classList.toggle("color-scheme-auto", requestedMode === "auto");
  })();
</script>

    
    <title th:text="|${theme.config.plugins?.portfolio?.title ?: '项目作品'} - ${site.title}|">项目作品</title>
  
    <script type="module" crossorigin src="/themes/halo-theme-hydro-minim/assets/modulepreload-polyfill-DFURTO-d.js"></script>
    <script type="module" crossorigin src="/themes/halo-theme-hydro-minim/assets/vendor~archives~author~bangumis~categories~category~doc-catalog~doc~docs~equipments~friends~cnig074y-CEtd067-.js"></script>
    <script type="module" crossorigin src="/themes/halo-theme-hydro-minim/assets/main-B10MSgKU.js"></script>
    <link rel="stylesheet" crossorigin href="/themes/halo-theme-hydro-minim/assets/main-0srKAI6O.css">
  </head>
  <body
    class="hydro-page"
    th:attr="
      data-smooth-scroll=${theme.config.presentation?.motion == null or theme.config.presentation.motion.smooth_scroll != false},
      data-enable-motion=${theme.config.presentation?.motion == null or theme.config.presentation.motion.enable_motion != false},
      data-theme-transition=${theme.config.presentation?.motion == null or theme.config.presentation.motion.enable_theme_transition != false},
      data-enable-hero-motion=${theme.config.presentation?.motion == null or theme.config.presentation.motion.enable_hero_motion != false},
      data-enable-card-hover=${theme.config.presentation?.motion == null or theme.config.presentation.motion.enable_card_hover != false},
      data-enable-lightbox=${theme.config.presentation?.motion == null or theme.config.presentation.motion.enable_lightbox != false},
      data-theme-to-light-label=${theme.config.presentation?.theme_toggle?.to_light_label ?: '切换为浅色模式'},
      data-theme-to-dark-label=${theme.config.presentation?.theme_toggle?.to_dark_label ?: '切换为深色模式'},
      data-allow-color-switch=${theme.config.navigation?.header == null or theme.config.navigation.header.allow_color_switch != false},
      data-member-plugin-available=${pluginFinder.available('PluginMember')},
      data-member-authenticated=${#authorization.expression('isAuthenticated()')},
      data-back-to-top-threshold=${theme.config.navigation?.floating?.back_to_top_threshold ?: 100},
      data-post-share-copied-text=${theme.config.content?.post?.share_copied_text ?: '已复制'},
      data-post-share-copy-prompt-title=${theme.config.content?.post?.copy_prompt_title ?: '复制链接'},
      data-post-upvote-error-text=${theme.config.content?.post?.upvote_error_text ?: '点赞失败，请稍后再试'},
      data-moment-upvote-error-text=${theme.config.plugins?.moments?.upvote_error_text ?: (theme.config.content?.post?.upvote_error_text ?: '点赞失败，请稍后再试')},
      data-doc-toc-empty-text=${theme.config.plugins?.docs?.toc_empty_text ?: '无目录'}
    "
  >
    <div
      th:if="${theme.config.presentation?.motion == null or theme.config.presentation.motion.show_grain != false}"
      class="grain-overlay"
      aria-hidden="true"
    ></div>

    <th:block th:replace="~{modules/header}" />

    <main>
      
  

  <section class="hydro-list-hero">
    <div class="hydro-container">
      <p th:text="${theme.config.plugins?.portfolio?.eyebrow ?: 'Portfolio'}">Portfolio</p>
      <h1 th:text="${theme.config.plugins?.portfolio?.title ?: '项目作品'}">项目作品</h1>
      <span
        th:text="${theme.config.plugins?.portfolio?.description ?: '这里记录了我的开源项目、产品、插件与工具作品。'}"
        >这里记录了我的开源项目、产品、插件与工具作品。</span
      >
    </div>
  </section>

  <section
    class="hydro-plugin-page hydro-portfolio-page pb-20"
    th:with="
      hasPortfolioPlugin=${pluginFinder.available('plugin-portfolio') or pluginFinder.available('PluginPortfolio') or pluginFinder.available('portfolio')},
      projectFinderBean=${#vars['projectFinder']},
      projectsData=${projects},
      isCollection=${projectsData != null and projectsData instanceof T(java.util.Collection)},
      projectList=${projectsData == null ? null : (isCollection ? projectsData : projectsData.items)},
      hasProjectsData=${projectList != null and not #lists.isEmpty(projectList)},
      platformLabels=${hasPortfolioPlugin and projectFinderBean != null ? projectFinderBean.platformLabels() : null},
      typeLabels=${hasPortfolioPlugin and projectFinderBean != null ? projectFinderBean.typeLabels() : null},
      isPaged=${projectsData != null and not isCollection}
    "
  >
    <div class="hydro-container">
      <!-- 插件未安装提示 -->
      <div class="hydro-plugin-notice" th:if="${not hasPortfolioPlugin}">
        <strong th:text="${theme.config.plugins?.portfolio?.install_title ?: '需要安装项目集插件'}"
          >需要安装项目集插件</strong
        >
        <span
          class="hydro-plugin-notice__body"
          th:text="${theme.config.plugins?.portfolio?.install_text ?: '需要安装并启用 halo-plugin-portfolio。在 Halo 控制台 -> 插件管理 -> 安装项目集插件后这里会自动展示项目。'}"
        >
          需要安装并启用 halo-plugin-portfolio。
        </span>
        <a
          class="hydro-plugin-install-link"
          href="https://github.com/liuyiwuqing/halo-plugin-portfolio"
          target="_blank"
          rel="noreferrer noopener"
          >GitHub 仓库</a
        >
      </div>

      <!-- 项目卡片网格 -->
      <div class="grid grid-cols-1 gap-6 md:grid-cols-2 lg:grid-cols-3" th:if="${hasProjectsData}">
        <article
          class="group relative flex flex-col overflow-hidden rounded-xl border border-neutral-200 bg-white transition-all duration-300 hover:-translate-y-1 hover:shadow-lg dark:border-neutral-800 dark:bg-neutral-900"
          th:each="project : ${projectList}"
        >
          <!-- 封面图 -->
          <div class="relative aspect-video w-full overflow-hidden bg-neutral-100 dark:bg-neutral-800">
            <img
              th:if="${not #strings.isEmpty(project.cover)}"
              th:src="${project.cover}"
              th:alt="${project.title}"
              class="h-full w-full object-cover transition-transform duration-500 group-hover:scale-105"
              loading="lazy"
            />
            <div
              th:if="${#strings.isEmpty(project.cover)}"
              class="flex h-full w-full items-center justify-center bg-neutral-100 text-lg font-medium text-neutral-400 dark:bg-neutral-800 dark:text-neutral-500"
            >
              <span th:text="${project.title}">Project</span>
            </div>
            <!-- 类型标签 -->
            <div class="absolute left-3 top-3 flex gap-2">
              <span
                th:if="${project.type}"
                th:text="${typeLabels != null and typeLabels[project.type] != null ? typeLabels[project.type] : project.type}"
                class="rounded bg-neutral-900/80 px-2 py-1 text-xs font-semibold text-white backdrop-blur dark:bg-neutral-800/80"
              >
                Type
              </span>
            </div>
          </div>

          <!-- 卡片内容 -->
          <div class="flex flex-1 flex-col p-5">
            <div class="mb-2 flex items-center justify-between gap-2">
              <span
                th:if="${project.platform}"
                th:text="${platformLabels != null and platformLabels[project.platform] != null ? platformLabels[project.platform] : project.platform}"
                class="text-xs font-medium uppercase tracking-wider text-neutral-500 dark:text-neutral-400"
              >
                Platform
              </span>
              <!-- 是否开源标识 (通过判断是否有仓库地址) -->
              <span
                th:if="${not #strings.isEmpty(project.repoUrl)}"
                class="rounded border border-emerald-200 bg-emerald-100 px-1.5 py-0.5 text-[10px] font-bold text-emerald-800 dark:border-emerald-900 dark:bg-emerald-950/40 dark:text-emerald-300"
              >
                开源
              </span>
            </div>

            <h3
              class="text-lg font-bold text-neutral-900 transition-colors duration-200 group-hover:text-red-500 dark:text-white dark:group-hover:text-red-400"
            >
              <a th:href="@{/projects/{slug}(slug=${project.slug})}" th:text="${project.title}"> 项目标题 </a>
            </h3>

            <p
              class="mt-2 line-clamp-2 flex-1 text-sm text-neutral-600 dark:text-neutral-400"
              th:text="${project.summary}"
            >
              项目简介。
            </p>

            <!-- 技术栈 -->
            <div class="mt-4 flex flex-wrap gap-1.5" th:if="${project.techStacks}">
              <span
                th:each="tech : ${project.techStacks}"
                th:text="${tech}"
                class="rounded-full border border-neutral-200 bg-neutral-100 px-2 py-0.5 text-xs text-neutral-700 dark:border-neutral-700 dark:bg-neutral-800 dark:text-neutral-300"
              >
                Vue
              </span>
            </div>

            <!-- 操作区 -->
            <div
              class="mt-5 flex items-center justify-between border-t border-neutral-100 pt-4 text-xs dark:border-neutral-800"
            >
              <a
                th:href="@{/projects/{slug}(slug=${project.slug})}"
                class="flex items-center gap-1 font-semibold text-neutral-800 transition-colors hover:text-red-500 dark:text-neutral-200 dark:hover:text-red-400"
              >
                详情页
                <svg class="h-3.5 w-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                  <path d="M5 12h14M12 5l7 7-7 7" />
                </svg>
              </a>
              <a
                th:if="${not #strings.isEmpty(project.repoUrl)}"
                th:href="${project.repoUrl}"
                target="_blank"
                rel="noreferrer noopener"
                class="flex items-center gap-1 font-semibold text-neutral-600 transition-colors hover:text-neutral-900 dark:text-neutral-400 dark:hover:text-white"
              >
                <svg class="h-4 w-4" fill="currentColor" viewBox="0 0 24 24">
                  <path
                    fill-rule="evenodd"
                    clip-rule="evenodd"
                    d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.462-1.11-1.462-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.831.092-.646.35-1.086.636-1.336-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.579.688.481C19.138 20.164 22 16.418 22 12c0-5.523-4.477-10-10-10z"
                  />
                </svg>
                直达仓库
              </a>
            </div>
          </div>
        </article>
      </div>

      <!-- 无数据提示 -->
      <div th:if="${hasPortfolioPlugin and not hasProjectsData}" class="hydro-plugin-empty">
        <span th:text="${theme.config.plugins?.portfolio?.eyebrow ?: 'Portfolio'}">Portfolio</span>
        <strong th:text="${theme.config.plugins?.portfolio?.empty_text ?: '暂无项目数据'}">暂无项目数据</strong>
        <p
          th:text="${theme.config.plugins?.portfolio?.empty_available_text ?: '项目集插件已开启，但在后台中没有找到已发布项目。'}"
        >
          项目集插件已开启，但在后台中没有找到已发布项目。
        </p>
      </div>

      <!-- 分页 -->
      <nav class="hydro-pagination" th:if="${isPaged and (projectsData.hasPrevious or projectsData.hasNext)}">
        <a
          th:if="${projectsData.hasPrevious}"
          th:href="@{${projectsData.prevUrl}}"
          th:text="${theme.config.navigation?.pagination?.previous_label ?: '上一页'}"
          >上一页</a
        >
        <span th:text="|${projectsData.page} / ${projectsData.totalPages}|">1 / 1</span>
        <a
          th:if="${projectsData.hasNext}"
          th:href="@{${projectsData.nextUrl}}"
          th:text="${theme.config.navigation?.pagination?.next_label ?: '下一页'}"
          >下一页</a
        >
      </nav>

      <!-- 评论区 -->
      <section
        id="comment"
        class="hydro-plugin-comments mt-12"
        th:if="${(theme.config.plugins?.portfolio == null or theme.config.plugins.portfolio.enable_comment != false) and haloCommentEnabled and singlePage != null}"
      >
        <h2 th:text="${theme.config.plugins?.portfolio?.comments_title ?: '留言'}">留言</h2>
        <halo:comment group="content.halo.run" kind="SinglePage" th:attr="name=${singlePage.metadata.name}" />
      </section>
    </div>
  </section>

    </main>

    <th:block th:replace="~{modules/footer}" />

    <!-- FAB + 返回顶部 -->
    <th:block th:replace="~{modules/fab}" />

    <halo:footer />
    <th:block
      th:if="${not #strings.isEmpty(theme.config.advanced?.inject?.footer_html)}"
      th:utext="${theme.config.advanced.inject.footer_html}"
    />
    <script
      th:if="${not #strings.isEmpty(theme.config.advanced?.inject?.code_js)}"
      th:utext="${theme.config.advanced.inject.code_js}"
    ></script>
  </body>
</html>
