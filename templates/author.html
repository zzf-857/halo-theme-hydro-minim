<!doctype html>
<html
  th:lang="${#locale.toLanguageTag}"
  th:style="|--hydro-light-bg:${theme.config.presentation?.color?.background_color ?: '#F3F3F3'}; --hydro-dark-bg:${theme.config.presentation?.color?.dark_background_color ?: '#101112'}; --hydro-coral-light:${theme.config.presentation?.color?.accent_color ?: '#FF6B6B'}; --hydro-coral-dark:${theme.config.presentation?.color?.dark_accent_color ?: theme.config.presentation?.color?.accent_color ?: '#FF8A8A'};|"
  th:attr="
    data-theme-default=${theme.config.presentation?.color?.color_scheme ?: 'auto'},
    data-hydro-smooth-scroll=${theme.config.presentation?.motion == null or theme.config.presentation.motion.smooth_scroll != false},
    data-hydro-motion=${(theme.config.presentation?.motion == null or theme.config.presentation.motion.enable_motion != false) ? 'on' : 'off'},
    data-hydro-theme-transition=${theme.config.presentation?.motion == null or theme.config.presentation.motion.enable_theme_transition != false},
    data-hydro-hero-motion=${theme.config.presentation?.motion == null or theme.config.presentation.motion.enable_hero_motion != false},
    data-hydro-card-hover=${theme.config.presentation?.motion == null or theme.config.presentation.motion.enable_card_hover != false},
    data-hydro-lightbox=${theme.config.presentation?.motion == null or theme.config.presentation.motion.enable_lightbox != false}
  "
  xmlns:th="http://www.thymeleaf.org"
>
  <head>
    <meta charset="UTF-8" />
<meta http-equiv="X-UA-Compatible" content="IE=edge" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=2" />
<meta
  name="theme-color"
  media="(prefers-color-scheme: light)"
  th:content="${theme.config.presentation?.color?.background_color ?: '#F3F3F3'}"
/>
<meta
  name="theme-color"
  media="(prefers-color-scheme: dark)"
  th:content="${theme.config.presentation?.color?.dark_background_color ?: '#101112'}"
/>
<link
  rel="icon"
  type="image/svg+xml"
  th:with="faviconHref = ${site.favicon ?: (theme.config.identity?.brand == null || #strings.isEmpty(theme.config.identity.brand.logo) ? #theme.assets('/brand/hydro-minim-mark.svg') : theme.config.identity.brand.logo)}"
  th:href="${faviconHref}"
/>
<th:block
  th:if="${not #strings.isEmpty(theme.config.advanced?.inject?.head_html)}"
  th:utext="${theme.config.advanced.inject.head_html}"
/>
<style
  th:if="${not #strings.isEmpty(theme.config.advanced?.inject?.code_css)}"
  th:utext="${theme.config.advanced.inject.code_css}"
></style>
<script th:inline="javascript">
  (() => {
    const root = document.documentElement;
    const defaultMode =
      root.dataset.themeDefault || /*[[${theme.config.presentation?.color?.color_scheme ?: 'auto'}]]*/ "auto";
    let storedMode = null;
    try {
      storedMode = window.localStorage.getItem("hydro-color-scheme");
    } catch {
      storedMode = null;
    }
    const requestedMode = storedMode || defaultMode || "auto";
    const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
    const resolvedMode = requestedMode === "dark" || (requestedMode === "auto" && prefersDark) ? "dark" : "light";

    root.dataset.hydroTheme = resolvedMode;
    root.dataset.colorScheme = requestedMode;
    root.classList.toggle("dark", requestedMode === "dark");
    root.classList.toggle("light", requestedMode === "light");
    root.classList.toggle("color-scheme-dark", requestedMode === "dark");
    root.classList.toggle("color-scheme-light", requestedMode === "light");
    root.classList.toggle("color-scheme-auto", requestedMode === "auto");
  })();
</script>

    
    <title th:text="|${author.spec.displayName} - ${site.title}|">作者</title>
  
    <script type="module" crossorigin src="/themes/halo-theme-hydro-minim/assets/modulepreload-polyfill-BBmNbXl1.js"></script>
    <script type="module" crossorigin src="/themes/halo-theme-hydro-minim/assets/vendor~archives~author~bangumis~categories~category~doc-catalog~doc~docs~equipments~friends~j952rvmq-QqzAlrCV.js"></script>
    <script type="module" crossorigin src="/themes/halo-theme-hydro-minim/assets/main-CSl8ZaCc.js"></script>
    <link rel="stylesheet" crossorigin href="/themes/halo-theme-hydro-minim/assets/main-BWyuArtk.css">
  </head>
  <body
    class="hydro-page"
    th:attr="
      data-smooth-scroll=${theme.config.presentation?.motion == null or theme.config.presentation.motion.smooth_scroll != false},
      data-enable-motion=${theme.config.presentation?.motion == null or theme.config.presentation.motion.enable_motion != false},
      data-theme-transition=${theme.config.presentation?.motion == null or theme.config.presentation.motion.enable_theme_transition != false},
      data-enable-hero-motion=${theme.config.presentation?.motion == null or theme.config.presentation.motion.enable_hero_motion != false},
      data-enable-card-hover=${theme.config.presentation?.motion == null or theme.config.presentation.motion.enable_card_hover != false},
      data-enable-lightbox=${theme.config.presentation?.motion == null or theme.config.presentation.motion.enable_lightbox != false},
      data-theme-to-light-label=${theme.config.presentation?.theme_toggle?.to_light_label ?: '切换为浅色模式'},
      data-theme-to-dark-label=${theme.config.presentation?.theme_toggle?.to_dark_label ?: '切换为深色模式'},
      data-allow-color-switch=${theme.config.navigation?.header == null or theme.config.navigation.header.allow_color_switch != false},
      data-member-plugin-available=${pluginFinder.available('PluginMember')},
      data-member-authenticated=${#authorization.expression('isAuthenticated()')},
      data-back-to-top-threshold=${theme.config.navigation?.floating?.back_to_top_threshold ?: 100},
      data-post-share-copied-text=${theme.config.content?.post?.share_copied_text ?: '已复制'},
      data-post-share-copy-prompt-title=${theme.config.content?.post?.copy_prompt_title ?: '复制链接'},
      data-post-upvote-error-text=${theme.config.content?.post?.upvote_error_text ?: '点赞失败，请稍后再试'},
      data-moment-upvote-error-text=${theme.config.plugins?.moments?.upvote_error_text ?: (theme.config.content?.post?.upvote_error_text ?: '点赞失败，请稍后再试')},
      data-doc-toc-empty-text=${theme.config.plugins?.docs?.toc_empty_text ?: '无目录'}
    "
  >
    <div
      th:if="${theme.config.presentation?.motion == null or theme.config.presentation.motion.show_grain != false}"
      class="grain-overlay"
      aria-hidden="true"
    ></div>

    <th:block th:replace="~{modules/header}" />

    <main>
      
  

  <section
    class="hydro-author-page"
    th:with="
      authorName=${author.spec.displayName},
      authorBio=${#strings.isEmpty(author.spec.bio) ? (site.subtitle ?: '记录思考、设计、开发与生活里值得停下来的片刻。') : author.spec.bio},
      authorInitial=${#strings.isEmpty(author.spec.displayName) ? 'H' : #strings.substring(author.spec.displayName, 0, 1)},
      firstPost=${posts.total gt 0 ? posts.items[0] : null}
    "
  >
    <div class="hydro-author-shell">
      <section class="hydro-author-spotlight" aria-labelledby="hydro-author-title">
        <div class="hydro-author-spotlight__copy">
          <h1 id="hydro-author-title">
            <strong th:text="${authorName}">作者名</strong>
          </h1>

          <div class="hydro-author-bio-panel">
            <span>Profile</span>
            <p th:text="${authorBio}">记录思考、设计、开发与生活里值得停下来的片刻。</p>
          </div>

          <div class="hydro-author-spotlight__actions">
            <a class="hydro-author-primary-link" href="#author-articles">
              <span th:text="${theme.config.content?.page?.author_articles_label ?: '文章'}">文章</span>
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 5v14M6 13l6 6 6-6"></path>
              </svg>
            </a>
            <a class="hydro-author-ghost-link" th:href="@{${author.status.permalink}}">
              <span>主页</span>
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M7 17 17 7M9 7h8v8"></path>
              </svg>
            </a>
          </div>
        </div>

        <div class="hydro-author-spotlight__visual" aria-hidden="true">
          <div class="hydro-author-orbit"></div>
          <div class="hydro-author-portrait">
            <img
              th:if="${not #strings.isEmpty(author.spec.avatar)}"
              th:src="${author.spec.avatar}"
              th:alt="${authorName}"
              loading="eager"
            />
            <span th:if="${#strings.isEmpty(author.spec.avatar)}" th:text="${authorInitial}">H</span>
          </div>
        </div>
      </section>

      <nav class="hydro-author-links" aria-label="作者页面快捷入口">
        <a class="hydro-author-link-card" href="#author-articles">
          <span class="hydro-author-link-card__icon">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M6 4h12M6 8h12M6 12h8M6 16h10M6 20h6"></path>
            </svg>
          </span>
          <span class="hydro-author-link-card__body">
            <strong>Blog</strong>
            <em>记录想法、技术和日常。</em>
          </span>
          <span class="hydro-author-link-card__arrow" aria-hidden="true">→</span>
        </a>

        <a class="hydro-author-link-card" th:href="@{/archives}">
          <span class="hydro-author-link-card__icon">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 6h16M4 12h16M4 18h10"></path>
              <path d="M8 3v6M16 3v6"></path>
            </svg>
          </span>
          <span class="hydro-author-link-card__body">
            <strong>Archive</strong>
            <em>按时间回看所有内容。</em>
          </span>
          <span class="hydro-author-link-card__arrow" aria-hidden="true">→</span>
        </a>

        <a class="hydro-author-link-card" th:href="@{/links}">
          <span class="hydro-author-link-card__icon">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M10 13a5 5 0 0 0 7.07 0l2.12-2.12a5 5 0 0 0-7.07-7.07L11 4.93"></path>
              <path d="M14 11a5 5 0 0 0-7.07 0L4.81 13.12a5 5 0 0 0 7.07 7.07L13 19.07"></path>
            </svg>
          </span>
          <span class="hydro-author-link-card__body">
            <strong>Links</strong>
            <em>发现常看的站点与朋友。</em>
          </span>
          <span class="hydro-author-link-card__arrow" aria-hidden="true">→</span>
        </a>

        <a
          class="hydro-author-link-card"
          th:href="${firstPost != null ? firstPost.status.permalink : author.status.permalink}"
        >
          <span class="hydro-author-link-card__icon">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M5 12h14M13 6l6 6-6 6"></path>
            </svg>
          </span>
          <span class="hydro-author-link-card__body">
            <strong>Latest</strong>
            <em th:text="${firstPost != null ? firstPost.spec.title : '等待第一篇新文章。'}">最新文章</em>
          </span>
          <span class="hydro-author-link-card__arrow" aria-hidden="true">→</span>
        </a>
      </nav>

      <section id="author-articles" class="hydro-author-articles" aria-labelledby="hydro-author-articles-title">
        <div class="hydro-author-articles__head">
          <div>
            <p>Recently Published</p>
            <h2
              id="hydro-author-articles-title"
              th:text="${theme.config.content?.page?.author_articles_label ?: '文章'}"
            >
              文章
            </h2>
          </div>
          <span
            th:text="|${theme.config.content?.page?.author_count_prefix ?: '共'} ${posts.total} ${theme.config.content?.page?.author_count_suffix ?: '篇'}|"
            >共 0 篇</span
          >
        </div>

        <div class="hydro-author-featured" th:if="${posts.total gt 0}">
          <article
            th:each="post,stat : ${posts.items}"
            th:if="${stat.index lt 3}"
            class="hydro-author-featured-card"
            th:classappend="${stat.index == 0} ? ' hydro-author-featured-card--lead' : ''"
            th:with="
              fallbackCover=${stat.index % 3 == 0 ? theme.config.identity?.defaults?.article_cover_1 : (stat.index % 3 == 1 ? theme.config.identity?.defaults?.article_cover_2 : theme.config.identity?.defaults?.article_cover_3)},
              cover=${#strings.isEmpty(post.spec.cover) ? fallbackCover : post.spec.cover}
            "
          >
            <a th:href="@{${post.status.permalink}}">
              <span class="hydro-author-featured-card__media">
                <img th:src="${cover}" th:alt="${post.spec.title}" loading="lazy" />
              </span>
              <span class="hydro-author-featured-card__body">
                <span class="hydro-author-featured-card__meta">
                  <time th:text="${#dates.format(post.spec.publishTime, 'yyyy.MM.dd')}">2024.01.15</time>
                  <em th:if="${not #lists.isEmpty(post.categories)}" th:text="${post.categories[0].spec.displayName}">
                    分类
                  </em>
                </span>
                <strong th:text="${post.spec.title}">文章标题</strong>
                <span th:text="${post.status.excerpt}">文章摘要</span>
              </span>
            </a>
          </article>
        </div>

        <div class="hydro-author-articles__list" th:if="${posts.total gt 0}">
          <a
            th:each="post,stat : ${posts.items}"
            th:href="@{${post.status.permalink}}"
            th:style="|--article-order: ${stat.index};|"
            class="hydro-author-article-row"
          >
            <span class="hydro-author-article-row__index" th:text="${#numbers.formatInteger(stat.count, 2)}">01</span>
            <span class="hydro-author-article-row__date">
              <time th:text="${#dates.format(post.spec.publishTime, 'yyyy.MM.dd')}">2024.01.15</time>
            </span>
            <span class="hydro-author-article-row__body">
              <strong th:text="${post.spec.title}">文章标题</strong>
              <em th:if="${not #lists.isEmpty(post.categories)}" th:text="${post.categories[0].spec.displayName}"
                >分类</em
              >
            </span>
            <span class="hydro-author-article-row__arrow" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path d="M7 17 17 7M9 7h8v8"></path>
              </svg>
            </span>
          </a>
        </div>

        <div
          th:if="${posts.total == 0}"
          class="hydro-empty"
          th:text="${theme.config.content?.page?.author_empty_text ?: '这位作者还没有文章。'}"
        >
          这位作者还没有文章。
        </div>

        <th:block
          th:replace="~{modules/pagination :: pagination(${posts.prevUrl},${posts.nextUrl},${posts.totalPages},${posts.page},${posts.hasPrevious()},${posts.hasNext()})}"
        />
      </section>
    </div>
  </section>

    </main>

    <th:block th:replace="~{modules/footer}" />

    <!-- FAB + 返回顶部 -->
    <th:block th:replace="~{modules/fab}" />

    <halo:footer />
    <th:block
      th:if="${not #strings.isEmpty(theme.config.advanced?.inject?.footer_html)}"
      th:utext="${theme.config.advanced.inject.footer_html}"
    />
    <script
      th:if="${not #strings.isEmpty(theme.config.advanced?.inject?.code_js)}"
      th:utext="${theme.config.advanced.inject.code_js}"
    ></script>
  </body>
</html>
