name: CD

on:
  release:
    types:
      - published

concurrency:
  group: cd-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  cd:
    uses: halo-sigs/reusable-workflows/.github/workflows/theme-cd.yaml@v4
    secrets:
      halo-pat: ${{ secrets.HALO_PAT }}
    permissions:
      contents: write
    with:
      app-id: app-bp8mtq4y
      node-version: "24"
      pnpm-version: "10.33.0"
