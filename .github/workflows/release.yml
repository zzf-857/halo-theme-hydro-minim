name: 构建并发布主题

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: 安装依赖
        run: pnpm install

      - name: 构建主题
        run: pnpm run build

      - name: 获取主题版本号
        id: get_version
        run: |
          VERSION=$(grep '^  version:' theme.yaml | sed 's/  version: //')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "构建版本: $VERSION"

      - name: 发布到 GitHub Releases（latest 标签）
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "最新构建版本 v${{ steps.get_version.outputs.version }}"
          body: |
            🚀 由 GitHub Actions 自动构建发布

            **版本号**：${{ steps.get_version.outputs.version }}
            **提交**：${{ github.sha }}
            **时间**：${{ github.event.head_commit.timestamp }}

            **安装方法**：下载下方 `halo-theme-hydro-minim-*.zip` 文件，在 Halo 后台 → 外观 → 主题 → 安装/升级 中上传即可。
          files: dist/*.zip
          prerelease: false
          make_latest: true
