<include src="layout.html">
  <template name="head">
    <title th:text="|${error.status} - ${site.title}|">出错了</title>
  </template>

  <section class="hydro-error">
    <div class="hydro-container">
      <span th:text="${theme.config.content?.page?.error_eyebrow ?: 'Hydro-Minim'}">Hydro-Minim</span>
      <h1 th:text="${error.status ?: '404'}">404</h1>
      <p
        th:text="${error.title ?: (theme.config.content?.page?.error_default_text ?: '页面没有找到，或它已经像氢气一样轻轻飘走。')}"
      >
        页面没有找到。
      </p>
      <a class="hydro-pill-link" th:href="@{/}" th:text="${theme.config.content?.page?.error_home_label ?: '返回首页'}">
        返回首页
      </a>
    </div>
  </section>
</include>
