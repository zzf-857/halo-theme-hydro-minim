<include src="layout.html">
  <template name="head">
    <title th:text="|${theme.config.content?.archive?.title ?: '归档'} - ${site.title}|">归档</title>
  </template>

  <section class="hydro-archive-page">
    <div class="hydro-container">
      <header class="hydro-archive-hero">
        <div class="hydro-archive-hero__copy">
          <p
            class="hydro-archive-hero__kicker"
            th:text="${theme.config.content?.archive?.eyebrow ?: 'Hydro-Minim / Archives'}"
          >
            Hydro-Minim / Archives
          </p>
          <h1 th:text="${theme.config.content?.archive?.title ?: '归档'}">归档</h1>
          <span
            th:text="${theme.config.content?.archive?.description ?: '文章按发布时间归入年份和月份，方便回看往期内容。'}"
          >
            文章按发布时间归入年份和月份，方便回看往期内容。
          </span>
        </div>
        <dl
          class="hydro-archive-hero__meta"
          th:if="${(theme.config.content?.archive == null or theme.config.content.archive.show_meta != false) and archives.total gt 0}"
        >
          <div>
            <dt th:text="${theme.config.content?.archive?.articles_metric_label ?: 'Articles'}">Articles</dt>
            <dd th:text="${archives.total}">0</dd>
          </div>
          <div>
            <dt th:text="${theme.config.content?.archive?.page_metric_label ?: 'Page'}">Page</dt>
            <dd th:text="|${archives.page}/${archives.totalPages}|">1/1</dd>
          </div>
        </dl>
      </header>

      <div class="hydro-archive" th:if="${archives.total gt 0}">
        <th:block th:each="archive : ${archives.items}">
          <section class="hydro-archive__year">
            <div class="hydro-archive__year-head">
              <p th:text="${theme.config.content?.archive?.year_label ?: 'Year'}">Year</p>
              <h2 th:text="${archive.year}">2026</h2>
              <span th:text="|${#lists.size(archive.months)} ${theme.config.content?.archive?.month_unit ?: '个月份'}|">
                3 个月份
              </span>
            </div>

            <div class="hydro-archive__months">
              <section class="hydro-archive__month" th:each="month : ${archive.months}">
                <div class="hydro-archive__month-head">
                  <h3
                    th:text="|${#numbers.formatInteger(month.month, 2)} ${theme.config.content?.archive?.month_suffix ?: '月'}|"
                  >
                    04 月
                  </h3>
                  <span th:text="|${#lists.size(month.posts)} ${theme.config.content?.archive?.post_unit ?: '篇'}|"
                    >4 篇</span
                  >
                </div>

                <div class="hydro-archive__items">
                  <a
                    th:each="post,stat : ${month.posts}"
                    class="hydro-archive__item"
                    th:href="@{${post.status.permalink}}"
                    th:with="
                  rawFallbackCover=${stat.index % 3 == 0 ? theme.config.identity?.defaults?.article_cover_1 : (stat.index % 3 == 1 ? theme.config.identity?.defaults?.article_cover_2 : theme.config.identity?.defaults?.article_cover_3)},
                  fallbackCover=${#strings.isEmpty(rawFallbackCover) ? #theme.assets('/images/article-1.jpg') : rawFallbackCover},
                      cover=${#strings.isEmpty(post.spec.cover) ? fallbackCover : post.spec.cover},
                      optimizedCover=${#strings.contains(cover, 'images.unsplash.com') ? cover + (#strings.contains(cover, '?') ? '&w=320&fit=crop&auto=format' : '?w=320&fit=crop&auto=format') : cover},
                      optimizedFallbackCover=${#strings.contains(fallbackCover, 'images.unsplash.com') ? fallbackCover + (#strings.contains(fallbackCover, '?') ? '&w=320&fit=crop&auto=format' : '?w=320&fit=crop&auto=format') : fallbackCover}
                    "
                  >
                    <time
                      class="hydro-archive__item-date"
                      th:datetime="${#dates.format(post.spec.publishTime, 'yyyy-MM-dd')}"
                      th:text="${#dates.format(post.spec.publishTime, 'MM.dd')}"
                    >
                      04.26
                    </time>
                    <span class="hydro-archive__item-main">
                      <strong th:text="${post.spec.title}">文章标题</strong>
                      <span th:if="${not #strings.isEmpty(post.status.excerpt)}" th:text="${post.status.excerpt}">
                        文章摘要
                      </span>
                      <em
                        th:if="${not #lists.isEmpty(post.categories)}"
                        th:text="${post.categories[0].spec.displayName}"
                      >
                        分类
                      </em>
                    </span>
                    <span
                      th:unless="${theme.config.content?.archive != null and theme.config.content.archive.show_post_cover == false}"
                      class="hydro-archive__item-cover"
                      aria-hidden="true"
                      data-progressive-media
                    >
                      <img
                        th:src="${thumbnail.gen(optimizedCover, 's')}"
                        th:alt="${post.spec.title}"
                        loading="lazy"
                        decoding="async"
                        data-progressive-image
                        th:attr="data-fallback-cover=${optimizedFallbackCover}"
                      />
                    </span>
                    <span class="hydro-archive__item-arrow" aria-hidden="true">
                      <svg viewBox="0 0 24 24">
                        <path d="M7 17 17 7M9 7h8v8"></path>
                      </svg>
                    </span>
                  </a>
                </div>
              </section>
            </div>
          </section>
        </th:block>
      </div>
      <div
        th:if="${archives.total == 0}"
        class="hydro-empty"
        th:text="${theme.config.content?.archive?.empty_text ?: '还没有归档文章。'}"
      >
        还没有归档文章。
      </div>
      <th:block
        th:replace="~{modules/pagination :: pagination(${archives.prevUrl},${archives.nextUrl},${archives.totalPages},${archives.page},${archives.hasPrevious()},${archives.hasNext()})}"
      />
    </div>
  </section>
</include>
