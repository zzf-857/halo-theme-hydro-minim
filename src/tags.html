<include src="layout.html">
  <template name="head">
    <title th:text="|${theme.config.content?.taxonomy?.tag_title ?: '标签'} - ${site.title}|">标签</title>
  </template>

  <section class="hydro-tags-page">
    <div class="hydro-container">
      <header class="hydro-tags-hero">
        <div class="hydro-tags-hero__copy">
          <p th:text="${theme.config.content?.taxonomy?.tag_eyebrow ?: 'Hydro-Minim / Tags'}">Hydro-Minim / Tags</p>
          <h1 th:text="${theme.config.content?.taxonomy?.tag_title ?: '标签'}">标签</h1>
          <span
            th:text="${theme.config.content?.taxonomy?.tag_description ?: '把散落的文章压缩成一组轻量关键词，从一个符号进入另一条阅读路径。'}"
          >
            把散落的文章压缩成一组轻量关键词，从一个符号进入另一条阅读路径。
          </span>
        </div>
        <dl
          class="hydro-tags-hero__meta"
          th:if="${(theme.config.content?.taxonomy == null or theme.config.content.taxonomy.tag_show_meta != false) and not #lists.isEmpty(tags)}"
        >
          <div>
            <dt th:text="${theme.config.content?.taxonomy?.tag_keywords_metric_label ?: 'Keywords'}">Keywords</dt>
            <dd th:text="${#lists.size(tags)}">0</dd>
          </div>
          <div>
            <dt th:text="${theme.config.content?.taxonomy?.tag_shape_metric_label ?: 'Shape'}">Shape</dt>
            <dd th:text="${theme.config.content?.taxonomy?.tag_shape_value ?: 'Cloud'}">Cloud</dd>
          </div>
        </dl>
      </header>

      <div class="hydro-tags-cloud-board" th:if="${not #lists.isEmpty(tags)}">
        <svg
          class="hydro-tags-sky"
          aria-hidden="true"
          focusable="false"
          viewBox="0 0 1440 720"
          preserveAspectRatio="none"
        >
          <defs>
            <linearGradient id="hydro-tags-sky-gradient" x1="0" x2="1" y1="0" y2="1">
              <stop offset="0%" stop-color="currentColor" stop-opacity="0.16" />
              <stop offset="48%" stop-color="currentColor" stop-opacity="0.07" />
              <stop offset="100%" stop-color="currentColor" stop-opacity="0.02" />
            </linearGradient>
            <radialGradient id="hydro-tags-sky-light" cx="28%" cy="18%" r="64%">
              <stop offset="0%" stop-color="currentColor" stop-opacity="0.2" />
              <stop offset="100%" stop-color="currentColor" stop-opacity="0" />
            </radialGradient>
          </defs>
          <rect width="1440" height="720" fill="url(#hydro-tags-sky-gradient)" />
          <rect width="1440" height="720" fill="url(#hydro-tags-sky-light)" />
          <g class="hydro-tags-sky__lines" fill="none" stroke="currentColor" stroke-linecap="round">
            <path d="M-40 536 C 170 482 286 606 482 546 S 782 488 962 546 1240 590 1480 526" />
            <path d="M64 170 C 128 112 210 114 256 168 C 302 116 394 124 426 190 C 498 184 540 214 564 254" />
            <path d="M904 122 C 956 82 1036 92 1068 150 C 1132 132 1204 166 1222 226" />
            <path d="M180 430 C 248 398 320 404 374 446 C 436 412 514 422 560 472" />
            <path d="M910 424 C 978 382 1064 396 1104 452 C 1162 432 1228 454 1264 502" />
          </g>
          <g class="hydro-tags-sky__marks" fill="currentColor">
            <circle cx="196" cy="256" r="3" />
            <circle cx="716" cy="136" r="2.5" />
            <circle cx="1278" cy="342" r="3" />
            <circle cx="482" cy="612" r="2.5" />
          </g>
        </svg>
        <div class="hydro-tags-cloud" aria-label="标签云">
          <a
            th:each="tag,stat : ${tags}"
            th:href="@{${tag.status.permalink}}"
            th:style="|--tag-order: ${stat.index}; --tag-weight: ${tag.postCount ?: 0}; --tag-chars: ${#strings.length(tag.spec.displayName ?: '')}; --tag-x: ${12 + ((stat.index * 37) % 76)}; --tag-y: ${16 + ((stat.index * 29) % 62)}; --tag-lane: ${stat.index % 9}; --tag-drift: ${(stat.index * 5) % 13}; --tag-rise: ${(stat.index * 7) % 11}; --tag-orbit: ${(stat.index * 11) % 17}; --tag-depth: ${(stat.index * 3) % 5}; --tag-phase: ${(stat.index * 13) % 19};|"
            class="hydro-tag-chip"
          >
            <svg class="hydro-tag-chip__cloud" aria-hidden="true" focusable="false" viewBox="0 0 72 40">
              <path
                d="M20.2 32.5H54c7.1 0 12.8-5 12.8-11.2 0-5.6-4.7-10.3-10.9-11.1C52.9 4.5 46.5 1.8 40.1 4c-4 1.4-7.1 4.3-8.6 7.8-2.4-1.7-5.7-2.3-8.8-1.4-4.7 1.3-7.8 5-7.9 9.3-5.5.7-9.6 4.4-9.6 9 0 5.1 5.1 3.8 15 3.8Z"
              />
            </svg>
            <span class="hydro-tag-chip__name" th:text="${tag.spec.displayName}">Tag</span>
            <sup th:text="${tag.postCount ?: 0}">0</sup>
          </a>
        </div>
      </div>
      <div
        th:if="${#lists.isEmpty(tags)}"
        class="hydro-empty"
        th:text="${theme.config.content?.taxonomy?.tag_empty_text ?: '还没有创建标签。'}"
      >
        还没有创建标签。
      </div>
    </div>
  </section>
</include>
