<section id="about" class="hydro-section hydro-about" data-about-section>
  <div class="hydro-container">
    <div class="hydro-about__grid" th:with="categories = ${categoryFinder.listAsTree()}">
      <div class="hydro-about__intro">
        <span class="hydro-about__eyebrow about-text-line" th:text="${theme.config.home?.about?.eyebrow ?: 'About'}">
          About
        </span>
        <h2 class="hydro-about__title">
          <span class="about-text-line" th:text="${theme.config.home?.about?.title ?: '关于'}">关于</span>
          <span class="about-text-line" th:text="${theme.config.home?.about?.subtitle ?: '艺术的生活家'}">
            艺术的生活家
          </span>
        </h2>
        <p class="hydro-about__lead about-text-line" th:text="${theme.config.home?.about?.paragraph_1}"></p>
      </div>

      <div class="hydro-about__content">
        <div class="hydro-about__statement about-text-line">
          <p th:text="${theme.config.home?.about?.paragraph_2}"></p>
          <p th:text="${theme.config.home?.about?.paragraph_3}"></p>
        </div>

        <div class="hydro-about__stats about-text-line">
          <div>
            <strong th:text="${posts.total ?: 0}">63</strong>
            <span>篇文章</span>
          </div>
          <div>
            <strong th:text="${#lists.size(categories)}">12</strong>
            <span>个分类</span>
          </div>
          <div>
            <strong th:text="${theme.config.home?.about?.readers ?: '2.4k'}">2.4k</strong>
            <span>位读者</span>
          </div>
        </div>

        <div
          class="hydro-socials about-text-line"
          th:if="${theme.config.home?.about == null or (theme.config.home.about.show_socials != false and theme.config.home.about.show_socials != 'false')}"
        >
          <a
            th:each="item : ${theme.config.identity?.social?.links}"
            th:if="${not #strings.isEmpty(item.url) and item.url != '#'}"
            th:href="${item.url}"
            th:attr="aria-label=${item.label}"
            th:target="${item.new_tab == true ? '_blank' : '_self'}"
            rel="noreferrer noopener"
          >
            <th:block th:if="${not #strings.isEmpty(item.icon)}" th:utext="${item.icon}" />
            <svg
              class="hydro-socials__fallback-icon"
              th:if="${#strings.isEmpty(item.icon)}"
              viewBox="0 0 24 24"
              aria-hidden="true"
            >
              <path d="M4 4l16 16M20 4 4 20"></path>
            </svg>
          </a>
        </div>
      </div>
    </div>
  </div>
</section>
