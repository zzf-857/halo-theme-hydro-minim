<footer
  class="hydro-footer"
  th:with="
    footerConfig = ${theme.config.identity?.footer},
    footerMenuName = ${footerConfig == null ? '' : (footerConfig.menu ?: '')},
    footerMenu = ${#strings.isEmpty(footerMenuName) ? null : menuFinder.getByName(footerMenuName)},
    menu = ${footerMenu != null ? footerMenu : menuFinder.getPrimary()},
    footerMarqueeText = ${footerConfig == null or #strings.isEmpty(footerConfig.marquee_text) ? '氢' : footerConfig.marquee_text},
    footerBrandText = ${footerConfig == null or #strings.isEmpty(footerConfig.brand_text) ? '氢' : footerConfig.brand_text},
    footerDescription = ${footerConfig == null or #strings.isEmpty(footerConfig.description) ? (site.subtitle ?: '艺术的生活家。在结构化与自由之间，寻找设计的平衡。') : footerConfig.description},
    footerCopyright = ${footerConfig == null or #strings.isEmpty(footerConfig.copyright) ? '© {year} {site}. 保留所有权利.' : footerConfig.copyright},
    footerCopyrightYear = ${#strings.replace(footerCopyright, '{year}', #dates.format(#dates.createNow(), 'yyyy'))},
    footerCopyrightText = ${#strings.replace(footerCopyrightYear, '{site}', site.title)},
    footerBuildText = ${footerConfig == null or #strings.isEmpty(footerConfig.build_text) ? '用 ♥ 与氢气构建' : footerConfig.build_text},
    footerIcpText = ${footerConfig == null ? '' : (footerConfig.icp_text ?: '')},
    footerGonganText = ${footerConfig == null ? '' : (footerConfig.gongan_text ?: '')},
    footerHasIcp = ${not #strings.isEmpty(footerIcpText)},
    footerHasGongan = ${not #strings.isEmpty(footerGonganText)},
    footerHasLegal = ${footerHasIcp or footerHasGongan},
    footerThemeName = ${theme.spec?.displayName ?: 'Hydro-Minim'},
    footerThemeUrl = ${theme.spec?.repo ?: (theme.spec?.homepage ?: '/')},
    footerHaloUrl = ${'https://www.halo.run/'},
    socialLinks = ${theme.config.identity?.social?.links}
  "
>
  <div
    th:if="${footerConfig == null or footerConfig.show_marquee != false}"
    class="hydro-footer__marquee"
    aria-hidden="true"
  >
    <div class="hydro-marquee-track">
      <span th:text="${footerMarqueeText}">氢</span>
      <span th:text="${footerMarqueeText}">氢</span>
      <span th:text="${footerMarqueeText}">氢</span>
      <span th:text="${footerMarqueeText}">氢</span>
    </div>
  </div>

  <div class="hydro-footer__inner">
    <div class="hydro-footer__grid">
      <div>
        <a class="hydro-footer__brand" th:href="@{/}" th:text="${footerBrandText}">氢</a>
        <p th:text="${footerDescription}">艺术的生活家。在结构化与自由之间，寻找设计的平衡。</p>
      </div>

      <div th:if="${footerConfig == null or footerConfig.show_nav != false}">
        <h2>导航</h2>
        <ul>
          <th:block th:if="${menu != null} and ${not #lists.isEmpty(menu.menuItems)}">
            <li th:each="item : ${menu.menuItems}">
              <a class="hydro-wavy-link" th:href="@{${item.status.href}}" th:target="${item.spec.target?.value}">
                <span th:text="${item.status.displayName}">Menu</span>
                <include src="wavy-line.html" />
              </a>
            </li>
          </th:block>
          <th:block th:unless="${menu != null} and ${not #lists.isEmpty(menu.menuItems)}">
            <th:block
              th:if="${theme.config.navigation?.fallback_menu?.links != null and not #lists.isEmpty(theme.config.navigation.fallback_menu.links)}"
            >
              <li th:each="item : ${theme.config.navigation.fallback_menu.links}">
                <a class="hydro-wavy-link" th:href="${item.url}">
                  <span th:text="${item.label}">导航</span><include src="wavy-line.html" />
                </a>
              </li>
            </th:block>
            <th:block
              th:unless="${theme.config.navigation?.fallback_menu?.links != null and not #lists.isEmpty(theme.config.navigation.fallback_menu.links)}"
            >
              <li>
                <a class="hydro-wavy-link" href="#about">关于<include src="wavy-line.html" /></a>
              </li>
              <li>
                <a class="hydro-wavy-link" href="#categories">分类<include src="wavy-line.html" /></a>
              </li>
              <li>
                <a class="hydro-wavy-link" th:href="@{/archives}">归档<include src="wavy-line.html" /></a>
              </li>
              <li>
                <a class="hydro-wavy-link" th:href="@{/rss.xml}">RSS<include src="wavy-line.html" /></a>
              </li>
            </th:block>
          </th:block>
        </ul>
      </div>

      <div th:if="${footerConfig == null or footerConfig.show_social != false}">
        <h2>社交</h2>
        <ul>
          <li
            th:each="item : ${socialLinks}"
            th:if="${socialLinks != null and not #strings.isEmpty(item.url) and item.url != '#'}"
          >
            <a
              class="hydro-wavy-link"
              th:href="${item.url}"
              th:target="${item.new_tab == true ? '_blank' : '_self'}"
              rel="noreferrer"
            >
              <span th:text="${item.label}">Social</span><include src="wavy-line.html" />
            </a>
          </li>
        </ul>
      </div>
    </div>

    <div class="hydro-footer__bar">
      <div class="hydro-footer__signature" aria-label="站点署名">
        <p class="hydro-footer__copyright" th:text="${footerCopyrightText}">© 2026 Hydro-Minim. 保留所有权利.</p>
        <p class="hydro-footer__build" th:text="${footerBuildText}">用 ♥ 与氢气构建</p>
        <div class="hydro-footer__credits" aria-label="主题与博客系统信息">
          <span class="hydro-footer__credits-label">Built with</span>
          <a
            class="hydro-footer__credit hydro-footer__credit--theme"
            th:href="${footerThemeUrl}"
            th:target="${footerThemeUrl == '/' ? '_self' : '_blank'}"
            rel="noreferrer"
            th:attr="aria-label=|主题：${footerThemeName}|"
          >
            <span class="hydro-footer__credit-prefix">Theme</span>
            <strong th:text="${footerThemeName}">Hydro-Minim</strong>
          </a>
          <a
            class="hydro-footer__credit hydro-footer__credit--halo"
            th:href="${footerHaloUrl}"
            target="_blank"
            rel="noreferrer"
            aria-label="博客系统：Halo"
          >
            <span class="hydro-footer__credit-prefix">CMS</span>
            <strong>Halo</strong>
          </a>
        </div>
      </div>
      <div th:if="${footerHasLegal}" class="hydro-footer__legal" aria-label="备案信息">
        <a
          th:if="${footerHasIcp}"
          class="hydro-footer__legal-link hydro-footer__legal-link--icp"
          th:href="${theme.config.identity.footer.icp_link ?: 'https://beian.miit.gov.cn/'}"
          target="_blank"
          rel="noreferrer"
        >
          <span class="hydro-footer__legal-kicker">ICP</span>
          <span th:text="${footerIcpText}">ICP 备案号</span>
        </a>
        <a
          th:if="${footerHasGongan}"
          class="hydro-footer__legal-link hydro-footer__legal-link--gongan"
          th:href="${theme.config.identity.footer.gongan_link ?: '#'}"
          target="_blank"
          rel="noreferrer"
        >
          <span class="hydro-footer__legal-kicker">公安联网</span>
          <span th:text="${footerGonganText}">公安备案号</span>
        </a>
      </div>
    </div>
  </div>
</footer>
