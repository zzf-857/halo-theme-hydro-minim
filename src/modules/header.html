<header
  class="hydro-nav"
  data-hydro-nav
  th:with="
    menu = ${menuFinder.getPrimary()},
    logoSrc = ${theme.config.brand == null || #strings.isEmpty(theme.config.brand.logo) ? #theme.assets('/brand/hydro-minim-mark.svg') : theme.config.brand.logo},
    darkLogoSrc = ${theme.config.brand == null || #strings.isEmpty(theme.config.brand.dark_logo) ? logoSrc : theme.config.brand.dark_logo},
    logoAlt = ${theme.config.brand == null || #strings.isEmpty(theme.config.brand.logo_alt) ? '氢·简 Hydro-Minim' : theme.config.brand.logo_alt}
  "
>
  <div class="hydro-nav__inner">
    <a class="hydro-logo" th:href="@{/}" th:attr="aria-label=${logoAlt}">
      <img class="hydro-logo__mark hydro-logo__mark--light" th:src="${logoSrc}" alt="" aria-hidden="true" />
      <img class="hydro-logo__mark hydro-logo__mark--dark" th:src="${darkLogoSrc}" alt="" aria-hidden="true" />
    </a>

    <nav class="hydro-nav__links" aria-label="Primary">
      <th:block th:if="${menu != null} and ${not #lists.isEmpty(menu.menuItems)}">
        <th:block th:each="item : ${menu.menuItems}">
          <a
            th:if="${#lists.isEmpty(item.children)}"
            th:href="@{${item.status.href}}"
            th:text="${item.status.displayName}"
            th:target="${item.spec.target?.value}"
            data-scramble
          ></a>
          <div th:unless="${#lists.isEmpty(item.children)}" class="hydro-dropdown" data-hydro-dropdown>
            <a
              th:href="@{${item.status.href}}"
              th:text="${item.status.displayName}"
              th:target="${item.spec.target?.value}"
              data-scramble
            ></a>
            <ul class="hydro-dropdown__menu">
              <li th:each="child : ${item.children}">
                <a
                  th:href="@{${child.status.href}}"
                  th:text="${child.status.displayName}"
                  th:target="${child.spec.target?.value}"
                ></a>
              </li>
            </ul>
          </div>
        </th:block>
      </th:block>
      <th:block th:unless="${menu != null} and ${not #lists.isEmpty(menu.menuItems)}">
        <a href="#articles" data-scramble>文章</a>
        <a href="#categories" data-scramble>分类</a>
        <a href="#about" data-scramble>关于</a>
      </th:block>
    </nav>

    <div class="hydro-nav__actions">
      <a
        th:if="${pluginFinder.available('PluginSearchWidget')}"
        class="hydro-icon-button"
        href="javascript:SearchWidget.open()"
        aria-label="搜索"
      >
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="11" cy="11" r="7"></circle>
          <path d="m20 20-3.5-3.5"></path>
        </svg>
      </a>
      <button
        th:unless="${pluginFinder.available('PluginSearchWidget')}"
        class="hydro-icon-button"
        type="button"
        data-hydro-search-toggle
        aria-label="搜索"
      >
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="11" cy="11" r="7"></circle>
          <path d="m20 20-3.5-3.5"></path>
        </svg>
      </button>
      <button
        class="hydro-icon-button hydro-theme-toggle"
        type="button"
        data-hydro-theme-toggle
        aria-label="切换深浅色"
      >
        <svg class="hydro-theme-sun" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="12" r="4"></circle>
          <path
            d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"
          ></path>
        </svg>
        <svg class="hydro-theme-moon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M20.99 12.37A8 8 0 1 1 11.63 3.01 6.5 6.5 0 0 0 20.99 12.37z"></path>
        </svg>
      </button>
      <button class="hydro-icon-button hydro-menu-button" type="button" data-hydro-mobile-toggle aria-label="菜单">
        <svg class="hydro-menu-open" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M4 7h16M4 12h16M4 17h16"></path>
        </svg>
        <svg class="hydro-menu-close" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M6 6l12 12M18 6 6 18"></path>
        </svg>
      </button>
    </div>
  </div>

  <div class="hydro-search-panel" data-hydro-search-panel>
    <form th:action="@{/search}" method="get">
      <input name="keyword" type="search" placeholder="搜索文章..." autocomplete="off" />
    </form>
  </div>
</header>

<div class="hydro-mobile-menu" data-hydro-mobile-menu th:with="menu = ${menuFinder.getPrimary()}">
  <nav aria-label="Mobile">
    <th:block th:if="${menu != null} and ${not #lists.isEmpty(menu.menuItems)}">
      <th:block th:each="item : ${menu.menuItems}">
        <a
          th:if="${#lists.isEmpty(item.children)}"
          th:href="@{${item.status.href}}"
          th:text="${item.status.displayName}"
          th:target="${item.spec.target?.value}"
        ></a>
        <div th:unless="${#lists.isEmpty(item.children)}" class="hydro-mobile-menu__group">
          <a
            th:href="@{${item.status.href}}"
            th:text="${item.status.displayName}"
            th:target="${item.spec.target?.value}"
          ></a>
          <div class="hydro-mobile-submenu">
            <a
              th:each="child : ${item.children}"
              th:href="@{${child.status.href}}"
              th:text="${child.status.displayName}"
              th:target="${child.spec.target?.value}"
            ></a>
          </div>
        </div>
      </th:block>
    </th:block>
    <th:block th:unless="${menu != null} and ${not #lists.isEmpty(menu.menuItems)}">
      <a href="#articles">文章</a>
      <a href="#categories">分类</a>
      <a href="#about">关于</a>
    </th:block>
  </nav>
</div>
