<include src="layout.html">
  <template name="head">
    <title th:text="|${theme.config.plugins?.photos?.title ?: '图库'} - ${site.title}|">图库</title>
  </template>

  <section class="hydro-list-hero">
    <div class="hydro-container">
      <p th:text="${theme.config.plugins?.photos?.eyebrow ?: 'Gallery'}">Gallery</p>
      <h1 th:text="${theme.config.plugins?.photos?.title ?: '图库'}">图库</h1>
      <span th:text="${theme.config.plugins?.photos?.description ?: '用镜头定格光影，每一帧都是时间的切片。'}">
        用镜头定格光影，每一帧都是时间的切片。
      </span>
    </div>
  </section>

  <section class="hydro-photos-section">
    <div
      class="hydro-container"
      th:with="
        hasPhotosPlugin=${pluginFinder.available('PluginPhotos') or pluginFinder.available('plugin-photos')},
        isSinglePageRoute=${singlePage != null},
        pageBaseUrl=${isSinglePageRoute ? singlePage.status.permalink : '/photos'},
        currentGroup=${param.group != null and not #lists.isEmpty(param.group) ? param.group[0] : null},
        photosPageSizeText=${theme.config.plugins?.photos?.page_size == null ? '' : #strings.trim('' + theme.config.plugins.photos.page_size)},
        photosPageSizeRaw=${photosPageSizeText.matches('^[0-9]{1,3}$') ? T(java.lang.Integer).parseInt(photosPageSizeText) : 30},
        photosPageSize=${photosPageSizeRaw < 1 ? 30 : photosPageSizeRaw},
        photoGroups=${hasPhotosPlugin and photoFinder != null ? photoFinder.groupBy() : null},
        photosData=${photos != null ? photos : (hasPhotosPlugin and photoFinder != null ? photoFinder.list(1, photosPageSize, currentGroup) : null)},
        hasPhotosData=${photosData != null and photosData.items != null and not #lists.isEmpty(photosData.items)}"
    >
      <div class="hydro-plugin-notice" th:if="${not hasPhotosPlugin}">
        <strong th:text="${theme.config.plugins?.photos?.install_title ?: '需要安装图库插件'}">需要安装图库插件</strong>
        <span
          class="hydro-plugin-notice__body"
          th:text="${theme.config.plugins?.photos?.install_text ?: '需要安装并启用 PluginPhotos。在 Halo Console -> 应用市场搜索“图库管理”，创建分组和图片后这里会展示瀑布流。'}"
          >需要安装并启用 PluginPhotos。在 Halo Console ->
          应用市场搜索“图库管理”，创建分组和图片后这里会展示瀑布流。</span
        >
        <a
          class="hydro-plugin-install-link"
          href="https://www.halo.run/store/apps/app-BmQJW"
          target="_blank"
          rel="noreferrer noopener"
          >应用市场</a
        >
      </div>

      <!-- 分组 Tab 导航 -->
      <nav class="hydro-photos-tabs" th:if="${hasPhotosPlugin}" aria-label="图库分组">
        <a
          th:href="@{${pageBaseUrl}}"
          class="hydro-photos-tab"
          th:classappend="${#lists.isEmpty(param.group)} ? ' is-active' : ''"
          th:text="${theme.config.plugins?.photos?.all_group_label ?: '全部'}"
          >全部</a
        >
        <a
          th:each="group : ${photoGroups}"
          th:href="@{${pageBaseUrl}(group=${group.metadata.name})}"
          class="hydro-photos-tab"
          th:classappend="${#lists.contains(param.group, group.metadata.name)} ? ' is-active' : ''"
          th:text="${group.spec.displayName}"
        ></a>
      </nav>

      <!-- 瀑布流图片 -->
      <div class="hydro-photos-masonry" th:if="${hasPhotosData}">
        <div class="hydro-photo-card" th:each="photo : ${photosData.items}">
          <button
            class="hydro-photo-card__inner"
            th:attr="data-src=${photo.spec.url},data-alt=${photo.spec.displayName},data-media-error-text=${photo.spec.displayName ?: '图片暂时不可见'}"
            data-progressive-media
            data-lightbox-trigger
          >
            <img
              th:src="${thumbnail.gen(photo.spec.url, 'm')}"
              th:srcset="|${thumbnail.gen(photo.spec.url, 's')} 420w, ${thumbnail.gen(photo.spec.url, 'm')} 760w, ${thumbnail.gen(photo.spec.url, 'l')} 1160w|"
              sizes="(max-width: 720px) calc((100vw - 2.75rem) / 2), (max-width: 1100px) calc((100vw - 5rem) / 2), 31vw"
              th:alt="${photo.spec.displayName}"
              loading="lazy"
              decoding="async"
              data-progressive-image
            />
            <div class="hydro-photo-card__overlay">
              <div class="hydro-photo-card__info">
                <h3
                  th:if="${not #strings.isEmpty(photo.spec.displayName)}"
                  th:text="${photo.spec.displayName}"
                  class="hydro-photo-card__title"
                >
                  图片名称
                </h3>
                <p
                  th:if="${not #strings.isEmpty(photo.spec.description)}"
                  th:text="${photo.spec.description}"
                  class="hydro-photo-card__desc"
                ></p>
              </div>
            </div>
          </button>
        </div>
      </div>

      <div th:if="${not hasPhotosPlugin}" class="hydro-plugin-empty hydro-plugin-empty--install">
        <span th:text="${theme.config.plugins?.photos?.eyebrow ?: 'Gallery'}">Gallery</span>
        <strong th:text="${theme.config.plugins?.photos?.install_title ?: '需要安装图库插件'}">需要安装图库插件</strong>
        <p
          th:text="${theme.config.plugins?.photos?.install_text ?: '请安装 PluginPhotos，路径：Halo Console -> 应用市场 -> 搜索“图库管理”。'}"
        >
          请安装 PluginPhotos，路径：Halo Console -> 应用市场 -> 搜索“图库管理”。
        </p>
        <a
          class="hydro-plugin-install-link"
          href="https://www.halo.run/store/apps/app-BmQJW"
          target="_blank"
          rel="noreferrer noopener"
          >查看插件</a
        >
      </div>

      <div
        th:if="${hasPhotosPlugin and not hasPhotosData}"
        class="hydro-empty"
        th:text="${theme.config.plugins?.photos?.empty_available_text ?: (theme.config.plugins?.photos?.empty_text ?: '暂无图片。')}"
      >
        暂无图片。
      </div>

      <nav
        class="hydro-pagination"
        th:if="${not isSinglePageRoute and photosData != null and (photosData.hasPrevious() or photosData.hasNext())}"
      >
        <a
          th:if="${photosData.hasPrevious()}"
          th:href="@{${photosData.prevUrl}}"
          th:text="${theme.config.navigation?.pagination?.previous_label ?: '上一页'}"
          >上一页</a
        >
        <span th:text="|${photosData.page} / ${photosData.totalPages}|">1 / 1</span>
        <a
          th:if="${photosData.hasNext()}"
          th:href="@{${photosData.nextUrl}}"
          th:text="${theme.config.navigation?.pagination?.next_label ?: '下一页'}"
          >下一页</a
        >
      </nav>

      <section
        id="comment"
        class="hydro-plugin-comments"
        th:if="${(theme.config.plugins?.photos == null or theme.config.plugins.photos.enable_comment != false) and haloCommentEnabled and singlePage != null}"
      >
        <h2 th:text="${theme.config.plugins?.photos?.comments_title ?: '评论'}">评论</h2>
        <halo:comment group="content.halo.run" kind="SinglePage" th:attr="name=${singlePage.metadata.name}" />
      </section>
    </div>
  </section>

  <!-- 灯箱 -->
  <div class="hydro-lightbox" data-lightbox aria-hidden="true">
    <button class="hydro-lightbox__close" data-lightbox-close aria-label="关闭">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12"></path></svg>
    </button>
    <button class="hydro-lightbox__prev" data-lightbox-prev aria-label="上一张">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 18 9 12l6-6"></path></svg>
    </button>
    <img class="hydro-lightbox__img" data-lightbox-img src="" alt="" />
    <button class="hydro-lightbox__next" data-lightbox-next aria-label="下一张">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 18l6-6-6-6"></path></svg>
    </button>
    <div class="hydro-lightbox__counter" data-lightbox-counter></div>
  </div>
</include>
