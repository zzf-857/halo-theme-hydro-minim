<!doctype html>
<html
  th:lang="${#locale.toLanguageTag}"
  th:attr="data-theme-default=${theme.config.style.color_scheme ?: 'auto'}"
  xmlns:th="http://www.thymeleaf.org"
>
  <head>
    <include src="base-head.html" />
    <slot name="head">
      <title th:text="${site.title}">Hydro-Minim</title>
    </slot>
  </head>
  <body
    class="hydro-page"
    th:style="|--hydro-light-bg:${theme.config.style.background_color ?: '#F3F3F3'}; --hydro-dark-bg:${theme.config.style.dark_background_color ?: '#101112'}; --hydro-coral:${theme.config.style.accent_color ?: '#FF6B6B'};|"
    th:attr="data-smooth-scroll=${theme.config.style.smooth_scroll},data-enable-motion=${theme.config.style.enable_motion}"
  >
    <div th:if="${theme.config.style.grain}" class="grain-overlay" aria-hidden="true"></div>

    <th:block th:replace="~{modules/header}" />

    <main class="tilt-on-scroll" style="transform-style: preserve-3d">
      <slot />
    </main>

    <th:block th:replace="~{modules/footer}" />
    <halo:footer />
  </body>
</html>
