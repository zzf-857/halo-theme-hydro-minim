<include src="layout.html">
  <template
    name="head"
    th:with="
      homeConfig=${theme.config.home},
      heroConfig=${homeConfig?.hero},
      showHero=${heroConfig == null or (heroConfig.enabled != false and heroConfig.enabled != 'false')},
      heroCover=${#strings.isEmpty(heroConfig?.cover) ? #theme.assets('/images/hero-featured.jpg') : heroConfig.cover}
    "
  >
    <title th:text="${#strings.isEmpty(site.subtitle) ? site.title : site.title + ' - ' + site.subtitle}">
      站点标题
    </title>
    <link th:if="${showHero}" rel="preload" th:href="${heroCover}" as="image" fetchpriority="high" />
  </template>

  <div
    class="hydro-home"
    th:with="
      homeConfig=${theme.config.home},
      showHero=${homeConfig?.hero == null or (homeConfig.hero.enabled != false and homeConfig.hero.enabled != 'false')},
      showLatest=${homeConfig?.latest == null or (homeConfig.latest.enabled != false and homeConfig.latest.enabled != 'false')},
      showCategories=${homeConfig?.categories == null or (homeConfig.categories.enabled != false and homeConfig.categories.enabled != 'false')},
      showAbout=${homeConfig?.about == null or (homeConfig.about.enabled != false and homeConfig.about.enabled != 'false')}
    "
    th:classappend="${showHero} ? '' : ' hydro-home--without-hero'"
  >
    <th:block th:if="${showHero}">
      <th:block th:replace="~{modules/hero}" />
    </th:block>
    <th:block th:if="${showLatest}">
      <th:block th:replace="~{modules/latest-articles}" />
    </th:block>
    <th:block th:if="${showCategories}">
      <th:block th:replace="~{modules/categories-showcase}" />
    </th:block>
    <th:block th:if="${showAbout}">
      <th:block th:replace="~{modules/about}" />
    </th:block>
  </div>
</include>
