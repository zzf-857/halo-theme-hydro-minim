<include src="layout.html">
  <template name="head">
    <title th:text="|${category.spec.displayName} - ${site.title}|">分类</title>
  </template>

  <th:block
    th:with="eyebrow=${theme.config.content?.taxonomy?.category_detail_eyebrow ?: 'Category'}, title=${category.spec.displayName}, description=${category.spec.description ?: (theme.config.content?.taxonomy?.category_detail_fallback_description ?: '这个分类下的文章都会在这里汇集。')}"
    th:replace="~{modules/list-hero}"
  />

  <section class="hydro-list-section hydro-taxonomy-detail-page">
    <div class="hydro-container">
      <div class="hydro-list-grid hydro-taxonomy-detail-grid" th:if="${posts.total gt 0}">
        <th:block th:each="post,stat : ${posts.items}">
          <th:block th:replace="~{modules/post-card :: post-card(${post},${stat.index})}" />
        </th:block>
      </div>
      <div
        th:if="${posts.total == 0}"
        class="hydro-empty"
        th:text="${theme.config.content?.taxonomy?.category_detail_empty_text ?: '这个分类下还没有文章。'}"
      >
        这个分类下还没有文章。
      </div>
      <th:block
        th:replace="~{modules/pagination :: pagination(${posts.prevUrl},${posts.nextUrl},${posts.totalPages},${posts.page},${posts.hasPrevious()},${posts.hasNext()})}"
      />
    </div>
  </section>
</include>
