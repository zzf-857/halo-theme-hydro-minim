<include src="layout.html">
  <template name="head">
    <title th:text="|${theme.config.plugins?.portfolio?.title ?: '项目作品'} - ${site.title}|">项目作品</title>
  </template>

  <section class="hydro-list-hero">
    <div class="hydro-container">
      <p th:text="${theme.config.plugins?.portfolio?.eyebrow ?: 'Portfolio'}">Portfolio</p>
      <h1 th:text="${theme.config.plugins?.portfolio?.title ?: '项目作品'}">项目作品</h1>
      <span
        th:text="${theme.config.plugins?.portfolio?.description ?: '这里记录了我的开源项目、产品、插件与工具作品。'}"
        >这里记录了我的开源项目、产品、插件与工具作品。</span
      >
    </div>
  </section>

  <section
    class="hydro-plugin-page hydro-portfolio-page pb-20"
    th:with="
      hasPortfolioPlugin=${pluginFinder.available('plugin-portfolio') or pluginFinder.available('PluginPortfolio') or pluginFinder.available('portfolio')},
      projectFinderBean=${#vars['projectFinder']},
      projectsData=${projects},
      isCollection=${projectsData != null and projectsData instanceof T(java.util.Collection)},
      projectList=${projectsData == null ? null : (isCollection ? projectsData : projectsData.items)},
      hasProjectsData=${projectList != null and not #lists.isEmpty(projectList)},
      platformLabels=${hasPortfolioPlugin and projectFinderBean != null ? projectFinderBean.platformLabels() : null},
      typeLabels=${hasPortfolioPlugin and projectFinderBean != null ? projectFinderBean.typeLabels() : null},
      isPaged=${projectsData != null and not isCollection}
    "
  >
    <div class="hydro-container">
      <!-- 插件未安装提示 -->
      <div class="hydro-plugin-notice" th:if="${not hasPortfolioPlugin}">
        <strong th:text="${theme.config.plugins?.portfolio?.install_title ?: '需要安装项目集插件'}">需要安装项目集插件</strong>
        <span
          class="hydro-plugin-notice__body"
          th:text="${theme.config.plugins?.portfolio?.install_text ?: '需要安装并启用 halo-plugin-portfolio。在 Halo 控制台 -> 插件管理 -> 安装项目集插件后这里会自动展示项目。'}"
        >
          需要安装并启用 halo-plugin-portfolio。
        </span>
        <a
          class="hydro-plugin-install-link"
          href="https://github.com/liuyiwuqing/halo-plugin-portfolio"
          target="_blank"
          rel="noreferrer noopener"
        >GitHub 仓库</a>
      </div>

      <!-- 项目卡片网格 -->
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" th:if="${hasProjectsData}">
        <article
          class="group relative flex flex-col overflow-hidden rounded-xl border border-neutral-200 dark:border-neutral-800 bg-white dark:bg-neutral-900 transition-all duration-300 hover:-translate-y-1 hover:shadow-lg"
          th:each="project : ${projectList}"
        >
          <!-- 封面图 -->
          <div class="aspect-video w-full overflow-hidden bg-neutral-100 dark:bg-neutral-800 relative">
            <img
              th:if="${not #strings.isEmpty(project.cover)}"
              th:src="${project.cover}"
              th:alt="${project.title}"
              class="h-full w-full object-cover transition-transform duration-500 group-hover:scale-105"
              loading="lazy"
            />
            <div th:if="${#strings.isEmpty(project.cover)}" class="flex h-full w-full items-center justify-center bg-neutral-100 dark:bg-neutral-800 text-neutral-400 dark:text-neutral-500 font-medium text-lg">
              <span th:text="${project.title}">Project</span>
            </div>
            <!-- 类型标签 -->
            <div class="absolute top-3 left-3 flex gap-2">
              <span
                th:if="${project.type}"
                th:text="${typeLabels != null and typeLabels[project.type] != null ? typeLabels[project.type] : project.type}"
                class="px-2 py-1 text-xs font-semibold rounded bg-neutral-900/80 dark:bg-neutral-800/80 text-white backdrop-blur"
              >
                Type
              </span>
            </div>
          </div>

          <!-- 卡片内容 -->
          <div class="flex flex-1 flex-col p-5">
            <div class="flex items-center justify-between gap-2 mb-2">
              <span
                th:if="${project.platform}"
                th:text="${platformLabels != null and platformLabels[project.platform] != null ? platformLabels[project.platform] : project.platform}"
                class="text-xs font-medium text-neutral-500 dark:text-neutral-400 uppercase tracking-wider"
              >
                Platform
              </span>
              <!-- 是否开源标识 (通过判断是否有仓库地址) -->
              <span
                th:if="${not #strings.isEmpty(project.repoUrl)}"
                class="px-1.5 py-0.5 text-[10px] font-bold rounded bg-emerald-100 dark:bg-emerald-950/40 text-emerald-800 dark:text-emerald-300 border border-emerald-200 dark:border-emerald-900"
              >
                开源
              </span>
            </div>

            <h3 class="text-lg font-bold text-neutral-900 dark:text-white group-hover:text-red-500 dark:group-hover:text-red-400 transition-colors duration-200">
              <a th:href="@{/projects/{slug}(slug=${project.slug})}" th:text="${project.title}">
                项目标题
              </a>
            </h3>

            <p class="mt-2 text-sm text-neutral-600 dark:text-neutral-400 line-clamp-2 flex-1" th:text="${project.summary}">
              项目简介。
            </p>

            <!-- 技术栈 -->
            <div class="mt-4 flex flex-wrap gap-1.5" th:if="${project.techStacks}">
              <span
                th:each="tech : ${project.techStacks}"
                th:text="${tech}"
                class="px-2 py-0.5 text-xs rounded-full bg-neutral-100 dark:bg-neutral-800 text-neutral-700 dark:text-neutral-300 border border-neutral-200 dark:border-neutral-700"
              >
                Vue
              </span>
            </div>

            <!-- 操作区 -->
            <div class="mt-5 pt-4 border-t border-neutral-100 dark:border-neutral-800 flex items-center justify-between text-xs">
              <a
                th:href="@{/projects/{slug}(slug=${project.slug})}"
                class="flex items-center gap-1 font-semibold text-neutral-800 dark:text-neutral-200 hover:text-red-500 dark:hover:text-red-400 transition-colors"
              >
                详情页
                <svg class="h-3.5 w-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
              </a>
              <a
                th:if="${not #strings.isEmpty(project.repoUrl)}"
                th:href="${project.repoUrl}"
                target="_blank"
                rel="noreferrer noopener"
                class="flex items-center gap-1 font-semibold text-neutral-600 dark:text-neutral-400 hover:text-neutral-900 dark:hover:text-white transition-colors"
              >
                <svg class="h-4 w-4" fill="currentColor" viewBox="0 0 24 24"><path fill-rule="evenodd" clip-rule="evenodd" d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.462-1.11-1.462-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.831.092-.646.35-1.086.636-1.336-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.579.688.481C19.138 20.164 22 16.418 22 12c0-5.523-4.477-10-10-10z"/></svg>
                直达仓库
              </a>
            </div>
          </div>
        </article>
      </div>

      <!-- 无数据提示 -->
      <div th:if="${hasPortfolioPlugin and not hasProjectsData}" class="hydro-plugin-empty">
        <span th:text="${theme.config.plugins?.portfolio?.eyebrow ?: 'Portfolio'}">Portfolio</span>
        <strong th:text="${theme.config.plugins?.portfolio?.empty_text ?: '暂无项目数据'}">暂无项目数据</strong>
        <p
          th:text="${theme.config.plugins?.portfolio?.empty_available_text ?: '项目集插件已开启，但在后台中没有找到已发布项目。'}"
        >
          项目集插件已开启，但在后台中没有找到已发布项目。
        </p>
      </div>

      <!-- 分页 -->
      <nav
        class="hydro-pagination"
        th:if="${isPaged and (projectsData.hasPrevious or projectsData.hasNext)}"
      >
        <a
          th:if="${projectsData.hasPrevious}"
          th:href="@{${projectsData.prevUrl}}"
          th:text="${theme.config.navigation?.pagination?.previous_label ?: '上一页'}"
          >上一页</a
        >
        <span th:text="|${projectsData.page} / ${projectsData.totalPages}|">1 / 1</span>
        <a
          th:if="${projectsData.hasNext}"
          th:href="@{${projectsData.nextUrl}}"
          th:text="${theme.config.navigation?.pagination?.next_label ?: '下一页'}"
          >下一页</a
        >
      </nav>

      <!-- 评论区 -->
      <section
        id="comment"
        class="hydro-plugin-comments mt-12"
        th:if="${(theme.config.plugins?.portfolio == null or theme.config.plugins.portfolio.enable_comment != false) and haloCommentEnabled and singlePage != null}"
      >
        <h2 th:text="${theme.config.plugins?.portfolio?.comments_title ?: '留言'}">留言</h2>
        <halo:comment group="content.halo.run" kind="SinglePage" th:attr="name=${singlePage.metadata.name}" />
      </section>
    </div>
  </section>
</include>
